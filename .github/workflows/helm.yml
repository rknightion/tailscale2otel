name: Helm

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - "config.example.yaml"
      - "internal/config/**"
      - "tools/configcheck/**"
      - ".github/workflows/helm.yml"
  # No path filter here on purpose: "helm lint + template + schema + docs" is a
  # required status check on `main`, so it must report on EVERY pull request. A
  # paths filter would skip the workflow on non-helm PRs, leaving them blocked on
  # a required check that never reports. The push trigger above stays path-scoped.
  pull_request:

permissions:
  contents: read

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: true

env:
  CHART_DIR: deploy/helm/tailscale2otel

jobs:
  lint-template:
    name: helm lint + template + schema + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: helm lint
        run: helm lint "$CHART_DIR"

      - name: helm template
        run: helm template t "$CHART_DIR" > /dev/null

      # Regenerate values.schema.json (draft-07; Helm only validates draft-07) and
      # fail if the committed copy drifts. The committed file is the baseline.
      - name: values.schema.json is in sync (losisin/helm-values-schema-json)
        uses: losisin/helm-values-schema-json-action@39cdf80504f6c95ad3c4f317e2135e2509ea56bb # v3.0.0
        with:
          values: ${{ env.CHART_DIR }}/values.yaml
          output: ${{ env.CHART_DIR }}/values.schema.json
          draft: 7
          fail-on-diff: true

      # Regenerate the chart README from README.md.gotmpl + value annotations and
      # fail if it drifts from the committed copy.
      - name: helm-docs is in sync (norwoodj/helm-docs)
        uses: losisin/helm-docs-github-action@3a4528e97c49a5e83de6b78c50c61c8ee5c9f944 # v2
        with:
          chart-search-root: ${{ env.CHART_DIR }}
          fail-on-diff: true

  configcheck:
    name: config.Load validates example + rendered config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: tools/configcheck/go.sum

      - name: Build configcheck (separate module)
        working-directory: tools/configcheck
        run: go build -o /tmp/configcheck .

      # Render the chart and extract the ConfigMap's config.yaml so config.Load
      # exercises the cross-field rules JSON Schema draft-07 cannot express.
      - name: Render Helm config
        run: |
          helm template t "$CHART_DIR" --show-only templates/configmap.yaml \
            | yq '.data."config.yaml"' > /tmp/rendered-config.yaml
          echo "--- rendered config (head) ---"
          head -20 /tmp/rendered-config.yaml

      - name: Validate example + rendered config
        run: /tmp/configcheck config.example.yaml /tmp/rendered-config.yaml

  # Single required status check for this workflow. Branch protection on `main` requires this
  # (alongside ci.yml's `ci-success`), so helm legs can be added or renamed without re-touching
  # protection. The pull_request trigger above has no path filter on purpose, so this always reports
  # on every PR. Fails if any leg failed or was cancelled. Renovate's automerge waits for it to go green.
  helm-success:
    name: helm-success
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-template, configcheck]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "helm-success — ${{ join(needs.*.result, ', ') }}"
