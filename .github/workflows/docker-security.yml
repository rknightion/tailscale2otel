name: Docker Security

# hadolint (Dockerfile lint) + Trivy (filesystem vuln/misconfig/secret scan), results uploaded to the
# GitHub Security tab as SARIF. Runs on main pushes + weekly so newly disclosed CVEs surface without a
# code change. Non-gating (not a required check). pull_request is intentionally omitted: SARIF upload
# needs security-events: write, which fork PRs don't get.
on:
  push:
    branches: [main]
  schedule:
    - cron: "30 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hadolint:
    name: hadolint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: deploy/Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig,secret
          format: sarif
          output: trivy.sarif
      - uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
