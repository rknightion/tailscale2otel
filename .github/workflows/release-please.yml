name: Release

# Releases are driven by release-please from Conventional Commits (the repo's
# commit convention). On every push to main, the `release-please` job maintains
# a "release PR" that accumulates the changelog + the next version. Merging that
# PR makes release-please create the GitHub Release + a `vX.Y.Z` tag and sets
# `release_created=true`, which unlocks the GoReleaser + Helm jobs below.
#
# Everything runs in ONE workflow gated on that output, so the default
# GITHUB_TOKEN is enough: we never depend on a token-created tag/release to
# trigger a SECOND workflow (events raised by GITHUB_TOKEN don't chain, which is
# the usual release-please footgun). No PAT / GitHub App is required.
#
# Images + the Helm chart are published by the `publish`/`edge` jobs via the shared
# rknightion container-publish reusable (native matrix, cosign, provenance, SBOM,
# Trivy). GoReleaser (`--skip=docker`) now ONLY builds the cross-compiled binaries +
# checksums + archive SBOMs and uploads them to the release release-please created;
# it does NOT overwrite the release body, so release-please stays the single owner of
# the changelog/notes. Snapshot ("edge") :main images + charts come from the `edge`
# job on every non-release push to main (replaces the old main-publish.yml).
on:
  push:
    branches: [main]

# Least-privilege default; each job widens this as needed.
permissions:
  contents: read

concurrency:
  # Serialize releases; never cancel one mid-flight.
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please (maintain release PR / cut release)
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + tag
      pull-requests: write # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      # Pinned to the immutable commit for release-please-action v4.
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token author for CI to run without manual approval
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Build + push the image + Helm chart for the freshly-created tag via the shared
  # rknightion container-publish reusable. Same run as the merge that created the release.
  publish:
    name: publish (image + helm)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write        # attach SBOMs + third-party notices to the GitHub Release
      packages: write
      id-token: write        # cosign keyless signing + provenance attestation
      attestations: write
      security-events: write # Trivy SARIF upload
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}

  # Edge build on every non-release push to main: publishes the :main multi-arch image
  # + a main-snapshot Helm chart via the shared reusable (replaces main-publish.yml).
  # release_created gates this vs publish, so they never both run on one push.
  edge:
    name: edge (:main image + helm)
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      release_tag: ""

  goreleaser:
    name: goreleaser (binaries only)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets to the release-please release
      packages: write # push images to ghcr.io
      id-token: write # keyless cosign signing via GitHub OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Build the exact commit release-please tagged.
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0 # full history so the changelog is complete
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign (keyless image + checksum signing) and syft (SBOMs).
      # Pinned to the immutable commit for cosign-installer v4.1.2;
      # installing cosign v3+ (cosign-release below) REQUIRES the v4 installer.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: 'v3.0.6'

      # Pinned syft (GoReleaser's archive SBOMs + the release SBOM step below) and go-licenses
      # (third-party notices). Both land on PATH ($GOPATH/bin); this replaces the unpinned
      # anchore/sbom-action/download-syft so the SBOM tool version is locked.
      - name: install pinned syft + go-licenses
        run: |
          go install github.com/anchore/syft/cmd/syft@v1.18.1
          go install github.com/google/go-licenses@v1.6.0

      # Generate the third-party notices BEFORE GoReleaser so the multi-arch image build can bake
      # them into /licenses/ (deploy/Dockerfile.goreleaser COPYs THIRD_PARTY_NOTICES.md, supplied
      # via `extra_files` in .goreleaser.yaml). Regenerated per release; never committed.
      - name: Generate third-party notices
        run: bash scripts/notices.sh

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          # --skip=docker: images are now published by the publish job above (shared reusable).
          # docker_signs in .goreleaser.yaml is a no-op with no docker artifacts; can be
          # removed from .goreleaser.yaml once the migration is confirmed stable.
          args: release --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NB: image SPDX+CycloneDX SBOMs are generated + attached by the shared reusable
      # (publish job), and THIRD_PARTY_NOTICES.md by publish.yml's notices job — so the old
      # binary-level SBOM upload here was removed (it clobbered the reusable's same-named
      # assets in a parallel-job race). GoReleaser still emits per-archive SBOMs via its
      # `sboms:` stanza, and the binaries bake THIRD_PARTY_NOTICES.md via extra_files.

  # helm-chart job removed: Helm publish is now handled by the `publish` job above
  # via the shared rknightion container-publish reusable (helm-chart-path input).
