name: Release

# Releases are driven by release-please from Conventional Commits (the repo's
# commit convention). On every push to main, the `release-please` job maintains
# a "release PR" that accumulates the changelog + the next version. Merging that
# PR makes release-please create the GitHub Release + a `vX.Y.Z` tag and sets
# `release_created=true`, which unlocks the GoReleaser + Helm jobs below.
#
# Everything runs in ONE workflow gated on that output, so the default
# GITHUB_TOKEN is enough: we never depend on a token-created tag/release to
# trigger a SECOND workflow (events raised by GITHUB_TOKEN don't chain, which is
# the usual release-please footgun). No PAT / GitHub App is required.
#
# GoReleaser builds the cross-compiled binaries + the multi-arch GHCR image and
# UPLOADS the binaries/checksums/SBOMs to the release release-please already
# created. It does NOT overwrite the release body — GoReleaser preserves an
# existing release body unless `release.mode: replace` is set, so release-please
# stays the single owner of the changelog/notes. Snapshot ("edge") images are
# published separately by main-publish.yml on every push to main.
on:
  push:
    branches: [main]

# Least-privilege default; each job widens this as needed.
permissions:
  contents: read

concurrency:
  # Serialize releases; never cancel one mid-flight.
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please (maintain release PR / cut release)
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + tag
      pull-requests: write # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      # Pinned to the immutable commit for release-please-action v4.
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token author for CI to run without manual approval
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  goreleaser:
    name: goreleaser (binaries + multi-arch image)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload release assets to the release-please release
      packages: write # push images to ghcr.io
      id-token: write # keyless cosign signing via GitHub OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Build the exact commit release-please tagged.
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0 # full history so the changelog is complete
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign (keyless image + checksum signing) and syft (SBOMs).
      # Pinned to the immutable commit for cosign-installer v4.1.2;
      # installing cosign v3+ (cosign-release below) REQUIRES the v4 installer.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: 'v3.0.6'

      # Pinned syft (GoReleaser's archive SBOMs + the release SBOM step below) and go-licenses
      # (third-party notices). Both land on PATH ($GOPATH/bin); this replaces the unpinned
      # anchore/sbom-action/download-syft so the SBOM tool version is locked.
      - name: install pinned syft + go-licenses
        run: |
          go install github.com/anchore/syft/cmd/syft@v1.18.1
          go install github.com/google/go-licenses@v1.6.0

      # Generate the third-party notices BEFORE GoReleaser so the multi-arch image build can bake
      # them into /licenses/ (deploy/Dockerfile.goreleaser COPYs THIRD_PARTY_NOTICES.md, supplied
      # via `extra_files` in .goreleaser.yaml). Regenerated per release; never committed.
      - name: Generate third-party notices
        run: bash scripts/notices.sh

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attach the third-party notices + SBOMs (SPDX 2.3 + CycloneDX 1.6, both JSON) to the GitHub
      # Release. These are release artifacts (regenerated per build), not committed files. The
      # binary is the SBOM scan target (it embeds the exact linked module set). The job already has
      # `contents: write`, used by `gh release upload`.
      - name: Attach SBOMs + third-party notices to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          go build -trimpath -ldflags "-s -w" -o bin/tailscale2otel ./cmd/tailscale2otel
          bash scripts/sbom.sh
          gh release upload "$TAG" \
            THIRD_PARTY_NOTICES.md \
            dist/sbom/tailscale2otel.spdx.json \
            dist/sbom/tailscale2otel.cdx.json \
            --clobber

  helm-chart:
    name: publish Helm chart (OCI)
    needs: [release-please, goreleaser]
    # Publish after the image exists, since the chart defaults its image tag to
    # the chart appVersion we set below.
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push chart to ghcr.io
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Package + push chart to ghcr.io (OCI)
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          # Keep the chart's own version (Chart.yaml); pin appVersion to this
          # release so the chart deploys the matching image tag by default.
          helm package deploy/helm/tailscale2otel \
            --app-version "$VERSION" \
            --destination /tmp/helm-pkg
          helm push /tmp/helm-pkg/tailscale2otel-*.tgz oci://ghcr.io/rknightion/charts
