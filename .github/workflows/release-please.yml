name: Release

# Releases are driven by release-please from Conventional Commits (the repo's
# commit convention). On every push to main, the `release-please` job maintains
# a "release PR" that accumulates the changelog + the next version. Merging that
# PR makes release-please create the GitHub Release + a `vX.Y.Z` tag and sets
# `release_created=true`, which unlocks the GoReleaser + Helm jobs below.
#
# Everything runs in ONE workflow gated on that output, so the default
# GITHUB_TOKEN is enough: we never depend on a token-created tag/release to
# trigger a SECOND workflow (events raised by GITHUB_TOKEN don't chain, which is
# the usual release-please footgun). No PAT / GitHub App is required.
#
# Images + the Helm chart are published by the `publish`/`edge` jobs via the shared
# rknightion container-publish reusable (native matrix, cosign, provenance, SBOM,
# Trivy). GoReleaser (`--skip=docker`) now ONLY builds the cross-compiled binaries +
# checksums + archive SBOMs and uploads them to the release release-please created;
# it does NOT overwrite the release body, so release-please stays the single owner of
# the changelog/notes. Snapshot ("edge") :main images + charts come from the `edge`
# job on every non-release push to main (replaces the old main-publish.yml).
on:
  push:
    branches: [main]

# Least-privilege default; each job widens this as needed.
permissions:
  contents: read

concurrency:
  # Serialize releases; never cancel one mid-flight.
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please (maintain release PR / cut release)
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + tag
      pull-requests: write # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      # Pinned to the immutable commit for release-please-action v4.
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token author for CI to run without manual approval
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Build + push the image + Helm chart for the freshly-created tag via the shared
  # rknightion container-publish reusable. Same run as the merge that created the release.
  publish:
    name: publish (image + helm)
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write        # attach SBOMs + third-party notices to the GitHub Release
      packages: write
      id-token: write        # cosign keyless signing + provenance attestation
      attestations: write
      security-events: write # Trivy SARIF upload
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}

  # Edge build on every non-release push to main: publishes the :main multi-arch image
  # + a main-snapshot Helm chart via the shared reusable (replaces main-publish.yml).
  # release_created gates this vs publish, so they never both run on one push.
  edge:
    name: edge (:main image + helm)
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      release_tag: ""

  # Binaries via the shared GoReleaser reusable: cross-compiled binaries + checksums +
  # archive SBOMs + cosign signatures, uploaded to the release-please release. Images +
  # THIRD_PARTY_NOTICES are published by the `publish` job (container-publish reusable),
  # so this skips docker. pre-cmd installs the pinned syft (archive SBOMs) + go-licenses
  # and regenerates the notices that .goreleaser.yaml bakes into the archives (extra_files).
  binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write # upload release assets
      id-token: write # keyless cosign signing
      packages: write
      attestations: write # SLSA build provenance (.intoto.jsonl) attached to the release
    # Pinned past v1.4.0 to pick up the SLSA build-provenance step (the .intoto.jsonl release
    # asset). Renovate will repin this to the tag once the shared repo cuts its next release.
    uses: rknightion/.github/.github/workflows/binaries.yml@7aa955ca8134be9eac7bbd009317f35d6216bef5 # main
    with:
      release-tag: ${{ needs.release-please.outputs.tag_name }}
      install-cosign: true
      goreleaser-args: "release --clean --skip=docker"
      pre-cmd: "go install github.com/anchore/syft/cmd/syft@v1.18.1 && go install github.com/google/go-licenses@v1.6.0 && bash scripts/notices.sh"
