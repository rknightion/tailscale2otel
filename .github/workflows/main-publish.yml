name: Main publish (snapshot)

# Publish a signed, pullable snapshot image + Helm chart on every push to main,
# so the latest main build is consumable without cutting a release. Releases
# (v* tags) are handled by release.yml via GoReleaser; this is the "edge" path.
#
# The image is built with Docker's official reusable build workflow
# (docker/github-builder). It fans out one platform per runner — linux/arm64
# builds natively on ubuntu-24.04-arm with NO QEMU emulation — then merges the
# manifest. It also generates SLSA build provenance + an SBOM attestation,
# keyless-signs the attestation manifests with cosign (GitHub OIDC), and
# cosign-signs the GitHub Actions build cache so restored layers must match the
# expected workflow identity. A follow-up job explicitly cosign-signs the pushed
# image digest itself so consumers can continue verifying the snapshot image.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default; the image/chart jobs widen this as needed.
permissions:
  contents: read

concurrency:
  # Only the latest main build matters; cancel superseded snapshot publishes.
  group: main-publish
  cancel-in-progress: true

env:
  CHART_DIR: deploy/helm/tailscale2otel
  CHART_REPO: oci://ghcr.io/rknightion/charts

jobs:
  vars:
    name: compute version vars
    runs-on: ubuntu-latest
    outputs:
      shortsha: ${{ steps.vars.outputs.shortsha }}
    steps:
      - id: vars
        run: echo "shortsha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  image:
    name: build + push snapshot image
    needs: vars
    # Manual dispatches can be started from arbitrary refs; only publish/sign
    # artifacts when the workflow is actually running on the protected main ref.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write # push image + attestations to ghcr.io
      id-token: write # keyless cosign signing (attestations + build cache) via OIDC
    # Pinned to the latest full tag; docker/github-builder also has a moving `v1`.
    uses: docker/github-builder/.github/workflows/build.yml@5f637c833aa76bc99372a1dc9a6f8bcd8056fb85 # v1.12.0
    with:
      output: image
      push: true
      file: deploy/Dockerfile
      # distribute (default true) fans out one platform per runner; the default
      # runner mapping sends linux/arm64 -> ubuntu-24.04-arm (native, no QEMU).
      platforms: linux/amd64,linux/arm64
      sbom: true # SBOM attestation (SLSA provenance is always generated + signed)
      sign: true # keyless-sign the attestation manifests (push is enabled)
      cache: true # GitHub Actions cache backend; entries are cosign-signed via OIDC
      cache-mode: max
      meta-images: ghcr.io/rknightion/tailscale2otel
      # Never emit `latest` here — that tag is reserved for real releases.
      meta-flavor: latest=false
      meta-tags: |
        type=raw,value=main
        type=raw,value=main-${{ needs.vars.outputs.shortsha }}
      # Standard OCI labels/annotations (title, source, licenses, created,
      # revision, version, ...) derived by docker/metadata-action.
      set-meta-labels: true
      set-meta-annotations: true
      build-args: |
        VERSION=main-${{ needs.vars.outputs.shortsha }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      github-token: ${{ github.token }}

  sign-image:
    name: sign snapshot image
    runs-on: ubuntu-latest
    needs: image
    # Match the image job's branch guard so manually dispatched non-main refs
    # cannot publish/sign main-named image snapshots.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write # push the image signature to ghcr.io
      id-token: write # keyless cosign signing via OIDC
    steps:
      # cosign signs by pulling/pushing registry artifacts, so it needs ghcr.io
      # credentials in the Docker keychain (~/.docker/config.json).
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign for keyless image signing. Pinned to a full v4 tag: cosign-installer
      # publishes no moving `v4` tag, and installing cosign v3+ requires the v4 installer.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.0.6'

      - name: sign image digest
        env:
          IMAGE: ghcr.io/rknightion/tailscale2otel
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          if [ -z "$DIGEST" ]; then
            echo "::error::docker/github-builder did not expose an image digest to sign"
            exit 1
          fi
          cosign sign --yes "${IMAGE}@${DIGEST}"

  chart:
    name: push + sign snapshot chart
    runs-on: ubuntu-latest
    needs: [vars, sign-image]
    # Match the image job's branch guard so manually dispatched non-main refs
    # cannot publish/sign main-named chart snapshots.
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write # push chart to ghcr.io
      id-token: write # keyless cosign signing via OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      # cosign signs by pulling the pushed chart, so it needs ghcr.io creds via the
      # Docker keychain (~/.docker/config.json). `helm registry login` below only
      # authenticates helm, not cosign — hence this explicit docker login.
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign for keyless chart signing. Pinned to the immutable commit for cosign-installer v4.1.2;
      # installing cosign v3+ requires the v4 installer.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: 'v3.0.6'

      - name: package + push + sign chart
        env:
          SHORTSHA: ${{ needs.vars.outputs.shortsha }}
        run: |
          chartver="$(grep -E '^version:' "$CHART_DIR/Chart.yaml" | awk '{print $2}')"
          # Prefix the short SHA with `g` (git-describe convention) so the SemVer
          # prerelease identifier is always alphanumeric. A bare 7-char SHA that is
          # all digits with a leading zero (e.g. 0835122) is an invalid numeric
          # SemVer identifier and `helm push` rejects it ("version segment starts
          # with 0").
          snapver="${chartver}-main.g${SHORTSHA}"  # SemVer prerelease, e.g. 0.2.0-main.gabc1234
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          # appVersion pins the chart to the snapshot image tag we just pushed.
          helm package "$CHART_DIR" \
            --version "$snapver" \
            --app-version "main-${SHORTSHA}" \
            --destination /tmp/helm-pkg
          push_out="$(helm push "/tmp/helm-pkg/tailscale2otel-${snapver}.tgz" "$CHART_REPO" 2>&1)"
          echo "$push_out"
          digest="$(echo "$push_out" | awk '/[Dd]igest:/ {print $2}')"
          if [ -n "$digest" ]; then
            cosign sign --yes "ghcr.io/rknightion/charts/tailscale2otel@${digest}"
          else
            echo "::warning::could not parse pushed chart digest; skipping chart signature"
          fi
