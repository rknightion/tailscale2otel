name: Main publish (snapshot)

# Publish a signed, pullable snapshot image + Helm chart on every push to main,
# so the latest main build is consumable without cutting a release. Releases
# (v* tags) are handled by release.yml via GoReleaser; this is the "edge" path.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push image + chart to ghcr.io
  id-token: write # keyless cosign signing via GitHub OIDC
  attestations: write # buildx SBOM/provenance attestations

concurrency:
  # Only the latest main build matters; cancel superseded snapshot publishes.
  group: main-publish
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/rknightion/tailscale2otel
  CHART_DIR: deploy/helm/tailscale2otel
  CHART_REPO: oci://ghcr.io/rknightion/charts

jobs:
  image:
    name: build + push + sign snapshot image
    runs-on: ubuntu-latest
    outputs:
      shortsha: ${{ steps.vars.outputs.shortsha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "shortsha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Never emit `latest` here — that tag is reserved for real releases.
          flavor: latest=false
          tags: |
            type=raw,value=main
            type=raw,value=main-${{ steps.vars.outputs.shortsha }}
          labels: |
            org.opencontainers.image.title=tailscale2otel
            org.opencontainers.image.source=https://github.com/rknightion/tailscale2otel
            org.opencontainers.image.licenses=Apache-2.0

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max # SLSA build provenance attestation
          sbom: true # SBOM attestation
          build-args: |
            VERSION=main-${{ steps.vars.outputs.shortsha }}

      - uses: sigstore/cosign-installer@v4
        with:
          cosign-release: 'v3.0.6'

      - name: cosign sign image (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

  chart:
    name: push + sign snapshot chart
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - uses: sigstore/cosign-installer@v4
        with:
          cosign-release: 'v3.0.6'

      - name: package + push + sign chart
        env:
          SHORTSHA: ${{ needs.image.outputs.shortsha }}
        run: |
          chartver="$(grep -E '^version:' "$CHART_DIR/Chart.yaml" | awk '{print $2}')"
          snapver="${chartver}-main.${SHORTSHA}"  # SemVer prerelease, e.g. 0.2.0-main.abc1234
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          # appVersion pins the chart to the snapshot image tag we just pushed.
          helm package "$CHART_DIR" \
            --version "$snapver" \
            --app-version "main-${SHORTSHA}" \
            --destination /tmp/helm-pkg
          push_out="$(helm push "/tmp/helm-pkg/tailscale2otel-${snapver}.tgz" "$CHART_REPO" 2>&1)"
          echo "$push_out"
          digest="$(echo "$push_out" | awk '/[Dd]igest:/ {print $2}')"
          if [ -n "$digest" ]; then
            cosign sign --yes "ghcr.io/rknightion/charts/tailscale2otel@${digest}"
          else
            echo "::warning::could not parse pushed chart digest; skipping chart signature"
          fi
