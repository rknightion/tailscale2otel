name: Live API contract

on:
  schedule:
    - cron: "45 6 * * *" # Daily 06:45 UTC
  workflow_dispatch:

# No id-token/OIDC: there is no published OIDC->Tailscale-API action. Instead we mint a
# short-lived token from Tailscale's documented OAuth endpoint using a READ-ONLY (all:read)
# OAuth client. Its credentials are GitHub secrets, which is safe here precisely because this
# lane is schedule + workflow_dispatch only: a fork PR never runs it, so it can never reach
# them. Worst case on a leak is "can read the tailnet". The minted token is masked and lives
# only for this run.
#
# This deliberately replaces an earlier design that kept the creds off GitHub, in the env of a
# dedicated self-hosted runner. That runner was never provisioned, so the lane queued forever
# and was auto-cancelled at 24h every week — it produced no signal at all between 413b314 and
# the fix (see #160). Standing a self-hosted runner up on a PUBLIC repo is also a risk GitHub
# warns against, since a fork PR can target it.
permissions:
  contents: read
  issues: write

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Mint short-lived read-only API token
        # Missing config is a misconfiguration of this lane, not a reason to pass quietly:
        # fail here rather than self-skipping, or the lane reports green having checked nothing.
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_CLIENT_SECRET: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          TS_TAILNET: ${{ vars.TS_TAILNET }}
        run: |
          set -euo pipefail
          missing=""
          [ -n "${TS_OAUTH_CLIENT_ID:-}" ] || missing="$missing secrets.TS_OAUTH_CLIENT_ID"
          [ -n "${TS_OAUTH_CLIENT_SECRET:-}" ] || missing="$missing secrets.TS_OAUTH_CLIENT_SECRET"
          [ -n "${TS_TAILNET:-}" ] || missing="$missing vars.TS_TAILNET"
          if [ -n "$missing" ]; then
            echo "live contract is misconfigured — unset:$missing" >&2
            exit 1
          fi
          token=$(curl -fsSL -u "${TS_OAUTH_CLIENT_ID}:${TS_OAUTH_CLIENT_SECRET}" \
            -d 'grant_type=client_credentials' \
            'https://api.tailscale.com/api/v2/oauth/token' | jq -r '.access_token')
          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "OAuth token exchange returned no access_token." >&2
            exit 1
          fi
          echo "::add-mask::$token"
          echo "TS_API_ACCESS_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Run live contract
        id: live
        env:
          TS_TAILNET: ${{ vars.TS_TAILNET }}
        run: |
          set +e
          go test -tags live -run TestLiveContract ./internal/tsapi/contract/live/ -v > /tmp/live.log 2>&1
          code=$?
          set -e
          # The test t.Skip()s when the token or tailnet is empty, and a skip still exits 0.
          # The step above makes that unreachable, but if it ever happens again, a skip must
          # never look clean — "Resolve tracking issue" would close the drift issue on nothing.
          if grep -q -- '--- SKIP' /tmp/live.log; then
            echo "live contract skipped despite passing preflight — refusing to report it clean." >&2
            code=1
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Summarize which ops were exercised
        # A bare green tells you nothing about coverage: if an op silently stopped being
        # exercised, the lane would still pass. List what actually ran, on pass and on fail.
        if: steps.live.outputs.code != ''
        run: |
          set -euo pipefail
          {
            echo "## Live Tailscale API contract — tailnet \`${TS_TAILNET}\`"
            echo
            echo "| op | result | time |"
            echo "| --- | --- | --- |"
            # e.g. "    --- PASS: TestLiveContract/listUsers (0.02s)"
            sed -nE 's#^ +--- (PASS|FAIL|SKIP): TestLiveContract/([A-Za-z0-9_]+) \((.*)\)$#| \2 | \1 | \3 |#p' \
              /tmp/live.log
            echo
            n=$(grep -cE '^ +--- (PASS|FAIL|SKIP): TestLiveContract/' /tmp/live.log || true)
            echo "${n} op(s) exercised against the live API."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          TS_TAILNET: ${{ vars.TS_TAILNET }}

      - name: Build report
        if: steps.live.outputs.code != '0' && steps.live.outputs.code != ''
        run: |
          {
            echo "## Live Tailscale API contract failures"
            echo
            echo '```'
            tail -c 8000 /tmp/live.log
            echo '```'
          } > /tmp/live.md

      - name: Report + fail
        if: steps.live.outputs.code != '0' && steps.live.outputs.code != ''
        uses: ./.github/actions/report-drift
        with:
          lane-label: live-contract
          title: "Live Tailscale API contract failing"
          report-path: /tmp/live.md
          # This lane executes only our own code (read-only API calls), so enrichment is safe.
          # Provide EITHER ANTHROPIC_API_KEY (pay-per-use) or CLAUDE_CODE_OAUTH_TOKEN (Max sub).
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Resolve tracking issue on clean run
        # Only when the contract actually ran and passed. A failed mint step leaves code empty,
        # and a skipped test is forced to code=1 above — neither proves anything.
        if: steps.live.outputs.code == '0'
        uses: ./.github/actions/resolve-drift
        with:
          lane-label: live-contract
