name: Issue Triage
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Triage issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const title = issue.title || '';
            const body = issue.body || '';
            const text = `${title}\n${body}`.toLowerCase();

            const labelCandidates = new Set();

            if (/\b(feature|enhancement|request|proposal|support for)\b/.test(text)) {
              labelCandidates.add('enhancement');
            } else if (/\b(bug|error|failure|fail|panic|crash|broken|incorrect|regression)\b/.test(text)) {
              labelCandidates.add('bug');
            } else {
              labelCandidates.add('question');
            }

            if (/\b(critical|security|vulnerability|data loss|credential|secret|token)\b/.test(text)) {
              labelCandidates.add('priority: critical');
            } else if (/\b(high|urgent|blocker|production|prod)\b/.test(text)) {
              labelCandidates.add('priority: high');
            } else if (/\b(low|minor|trivial|nice to have)\b/.test(text)) {
              labelCandidates.add('priority: low');
            } else {
              labelCandidates.add('priority: medium');
            }

            const { data: labels } = await github.rest.issues.listLabelsForRepo({
              owner,
              repo,
              per_page: 100,
            });
            const availableLabels = new Set(labels.map((label) => label.name));
            const labelsToAdd = [...labelCandidates].filter((label) => availableLabels.has(label));

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: labelsToAdd,
              });
            }

            const duplicateQuery = `${title} repo:${owner}/${repo} type:issue in:title -number:${issueNumber}`;
            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
              q: duplicateQuery,
              per_page: 1,
            });

            if (searchResult.items.length > 0) {
              const duplicate = searchResult.items[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `This may duplicate #${duplicate.number}: ${duplicate.html_url}`,
              });
            }
