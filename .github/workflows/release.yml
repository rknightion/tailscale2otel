name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release + upload artifacts
  packages: write # push images to ghcr.io
  id-token: write # keyless cosign signing via GitHub OIDC

jobs:
  goreleaser:
    name: goreleaser (binaries + multi-arch image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog is complete

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cosign (keyless image + checksum signing) and syft (SBOMs).
      - uses: sigstore/cosign-installer@v4
        with:
          cosign-release: 'v3.0.6'
      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-chart:
    name: publish Helm chart (OCI)
    runs-on: ubuntu-latest
    # Publish after the image exists, since the chart defaults its image tag to
    # the chart appVersion we set below.
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Package + push chart to ghcr.io (OCI)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"  # strip leading v: v1.2.3 -> 1.2.3
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          # Keep the chart's own version (Chart.yaml); pin appVersion to this
          # release so the chart deploys the matching image tag by default.
          helm package deploy/helm/tailscale2otel \
            --app-version "$version" \
            --destination /tmp/helm-pkg
          helm push /tmp/helm-pkg/tailscale2otel-*.tgz oci://ghcr.io/rknightion/charts
