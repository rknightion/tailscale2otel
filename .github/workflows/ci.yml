name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Root module + the three CI-only tool modules (each a separate go.mod).
        # gofmt/goimports are enforced here via the `formatters` block in
        # .golangci.yml, so there is no separate gofmt step.
        module: [".", "tools/configcheck", "tools/metricscatalog", "tools/apidrift"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}

  docs-catalog:
    name: docs/metrics.md is generated from the code catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: tools/metricscatalog/go.sum

      - name: Build metricscatalog (separate module)
        working-directory: tools/metricscatalog
        run: go build -o /tmp/metricscatalog .

      # Fail if the generated metric/log tables in docs/metrics.md drift from the
      # in-code telemetry catalog. Regenerate with `go run ./tools/metricscatalog
      # -write` (from the repo root) and commit the result.
      - name: docs/metrics.md is in sync with the in-code telemetry catalog
        run: /tmp/metricscatalog -check

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: govulncheck ./...

  goreleaser-snapshot:
    name: goreleaser build (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      # Cross-compile every target + build archives/checksums. .goreleaser.yaml has
      # no docker pipeline (the real image build is deploy/Dockerfile via
      # publish.yml/container-publish.yml), so no docker/qemu/syft is needed here;
      # the image is smoke-tested by docker-build below and fully built, pushed,
      # and signed by the `publish` job in release-please.yml.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          args: release --snapshot --clean --skip=publish,sign,sbom

  docker-build:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # The Dockerfile's `go build` step uses a BuildKit cache mount for the Go
      # build cache (/root/.cache/go-build). type=gha layer cache does NOT carry
      # cache-mount contents across runs, so restore/save it via actions/cache and
      # let buildkit-cache-dance inject it into (and extract it from) the build.
      - name: Restore Go build cache for Docker
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: go-build-cache
          key: ${{ runner.os }}-docker-go-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-go-build-
      - name: Inject Go build cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          cache-map: |
            {
              "go-build-cache": "/root/.cache/go-build"
            }

      - name: build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: tailscale2otel:ci
          # Layer cache (base image, go.mod copy, go mod download) across runs.
          cache-from: type=gha,scope=ci-smoke
          cache-to: type=gha,mode=max,scope=ci-smoke
          build-args: |
            VERSION=ci-${{ github.sha }}

  # Test coverage -> Codacy. Deliberately NOT in ci-success's `needs`: coverage reporting is
  # informational, so a Codacy outage — or a fork PR with no secret — must never block merges or
  # Renovate automerge. Builds a coverage profile over the root module and uploads it via the
  # pinned official reporter action (no curl|bash, which zizmor flags as a remote-script hazard).
  coverage:
    name: coverage (Codacy)
    runs-on: ubuntu-latest
    env:
      # Repo-scoped Codacy coverage token (Repository Settings > Coverage). Preferred over the
      # account token so this job only carries coverage-upload scope for THIS repo.
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts
          cache: true

      - name: go test (coverage profile)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}   # skip on fork PRs (secret unavailable)
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ env.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.out
          force-coverage-parser: go

  # Bounded exploratory fuzzing of the untrusted-input decode paths: the HEC receiver's
  # envelope parser (its body is attacker-reachable — the token is optional) and the flow/audit
  # record decoders, whose wire format is polymorphic by design.
  #
  # Deliberately NOT in ci-success. Each target's SEED corpus already runs inside the normal
  # `go test -race ./...` leg, so a known crasher always gates a merge; this job only explores
  # for NEW ones, which is nondeterministic. Gating on it would let an unrelated PR randomly trip
  # a latent crasher and block Renovate automerge. A failure here is a real bug — read the log.
  fuzz:
    name: fuzz (${{ matrix.package }} ${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/stream
            target: FuzzExtractRecords
          - package: ./internal/stream
            target: FuzzParseHECTime
          - package: ./internal/flowlog
            target: FuzzProcessorProcessAll
          - package: ./internal/audit
            target: FuzzProcessorProcessAll
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts
          cache: true

      - name: go test -fuzz ${{ matrix.target }}
        env:
          PKG: ${{ matrix.package }}
          TARGET: ${{ matrix.target }}
        run: |
          # Steps run under `bash -eo pipefail`, so guard the failure with `|| code=$?` —
          # a bare `go test` failure would otherwise abort the step before we can classify it.
          code=0
          go test "$PKG" -run '^$' -fuzz "^${TARGET}\$" -fuzztime=120s 2>&1 | tee /tmp/fuzz.log || code=$?
          [ "$code" -eq 0 ] && exit 0

          # A genuine finding ALWAYS writes the input out and says so. Check this first, so a
          # crasher can never be swallowed by the tolerance below.
          if grep -q "Failing input written to" /tmp/fuzz.log; then
            echo "::error::${TARGET}: fuzzing found a crasher — see the uploaded corpus artifact"
            exit 1
          fi

          # Upstream Go race, benign: on -fuzztime expiry the coordinator calls stop(ctx.Err())
          # with DeadlineExceeded, which internal/fuzz suppresses only if it == fuzzCtx.Err().
          # A parent context closes its own done channel BEFORE propagating cancellation to its
          # children, so if the coordinator wakes in that window fuzzCtx.Err() is still nil, the
          # comparison misses, and a clean timeout is reported as a test failure. Nothing was
          # found — the run simply ran out its clock. Contended runners widen the window.
          if grep -qE '^[[:space:]]*context deadline exceeded[[:space:]]*$' /tmp/fuzz.log; then
            echo "::warning::${TARGET}: benign -fuzztime shutdown race in Go's fuzzing runtime (no crasher found) — not failing"
            exit 0
          fi

          exit "$code"

      # A crasher is written to testdata/corpus/<target>/ — surface it so the failing input can be
      # committed as a regression seed rather than being lost with the runner.
      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers-${{ matrix.target }}-${{ strategy.job-index }}
          path: ${{ matrix.package }}/testdata/corpus/**
          if-no-files-found: ignore

  # Single required status check for this workflow. Branch protection on `main` requires this
  # (alongside helm.yml's `helm-success`), so CI legs can be added or renamed without re-touching
  # protection. Fails if any leg failed or was cancelled. Renovate's automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [build-test, lint, docs-catalog, govulncheck, goreleaser-snapshot, docker-build]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
