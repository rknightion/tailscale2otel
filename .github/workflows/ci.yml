name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build / vet / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test -race
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Root module + the three CI-only tool modules (each a separate go.mod).
        # gofmt/goimports are enforced here via the `formatters` block in
        # .golangci.yml, so there is no separate gofmt step.
        module: [".", "tools/configcheck", "tools/metricscatalog", "tools/apidrift"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: golangci-lint (${{ matrix.module }})
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          working-directory: ${{ matrix.module }}

  docs-catalog:
    name: docs/metrics.md is generated from the code catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: tools/metricscatalog/go.sum

      - name: Build metricscatalog (separate module)
        working-directory: tools/metricscatalog
        run: go build -o /tmp/metricscatalog .

      # Fail if the generated metric/log tables in docs/metrics.md drift from the
      # in-code telemetry catalog. Regenerate with `go run ./tools/metricscatalog
      # -write` (from the repo root) and commit the result.
      - name: docs/metrics.md is in sync with the in-code telemetry catalog
        run: /tmp/metricscatalog -check

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: govulncheck ./...

  goreleaser-snapshot:
    name: goreleaser build (snapshot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      # Cross-compile every target + build archives/checksums. The container
      # image (dockers_v2) is disabled in snapshot mode, so no docker/qemu/syft
      # is needed here; the image is smoke-tested by docker-build below and fully
      # built, pushed, and signed by release.yml.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "v2.16.0"
          args: release --snapshot --clean --skip=publish,sign,sbom

  docker-build:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # The Dockerfile's `go build` step uses a BuildKit cache mount for the Go
      # build cache (/root/.cache/go-build). type=gha layer cache does NOT carry
      # cache-mount contents across runs, so restore/save it via actions/cache and
      # let buildkit-cache-dance inject it into (and extract it from) the build.
      - name: Restore Go build cache for Docker
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: go-build-cache
          key: ${{ runner.os }}-docker-go-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-go-build-
      - name: Inject Go build cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@5422eac04292c961a382e0f584ea0f03ad9da723 # v3.4.0
        with:
          cache-map: |
            {
              "go-build-cache": "/root/.cache/go-build"
            }

      - name: build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: tailscale2otel:ci
          # Layer cache (base image, go.mod copy, go mod download) across runs.
          cache-from: type=gha,scope=ci-smoke
          cache-to: type=gha,mode=max,scope=ci-smoke
          build-args: |
            VERSION=ci-${{ github.sha }}

  # Test coverage -> Codacy. Deliberately NOT in ci-success's `needs`: coverage reporting is
  # informational, so a Codacy outage — or a fork PR with no secret — must never block merges or
  # Renovate automerge. Builds a coverage profile over the root module and uploads it via the
  # pinned official reporter action (no curl|bash, which zizmor flags as a remote-script hazard).
  coverage:
    name: coverage (Codacy)
    runs-on: ubuntu-latest
    env:
      # Account-level Codacy token; the reporter action derives provider/owner/repo from the GitHub
      # context, so no other Codacy env vars are needed.
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # zizmor: ignore[cache-poisoning] - test-only job, does not publish artifacts
          cache: true

      - name: go test (coverage profile)
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_API_TOKEN != '' }}   # skip on fork PRs (secret unavailable)
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          api-token: ${{ env.CODACY_API_TOKEN }}
          coverage-reports: coverage.out
          force-coverage-parser: go

  # Single required status check for this workflow. Branch protection on `main` requires this
  # (alongside helm.yml's `helm-success`), so CI legs can be added or renamed without re-touching
  # protection. Fails if any leg failed or was cancelled. Renovate's automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [build-test, lint, docs-catalog, govulncheck, goreleaser-snapshot, docker-build]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
