# GoReleaser v2 — https://goreleaser.com
#
#   goreleaser check                       # validate this config
#   goreleaser release --snapshot --clean  # local dry run (binaries/archives)
#
# Real releases run in .github/workflows/release-please.yml (push to main, gated on
# release-please's release_created output — NOT a `v*` tag push; there is no
# release.yml). Its `binaries` job calls this config via the shared
# rknightion/.github binaries.yml reusable with `--skip=docker` and produces ONLY
# cross-compiled binaries, a SHA256SUMS file, per-archive SBOMs, and keyless cosign
# signatures, uploaded to the release release-please already created. The multi-arch
# GHCR image is built separately (deploy/Dockerfile, not GoReleaser) by the `publish`
# job via the shared container-publish.yml reusable — this file has no docker
# pipeline of its own (removed; see deploy/CLAUDE.md).
version: 2

project_name: tailscale2otel

# Log the size of each built binary in the release output.
report_sizes: true

# Verifiable builds: fetch deps from proxy.golang.org and verify against
# sum.golang.org during release builds (the repo and module are public).
gomod:
  proxy: true

builds:
  - id: tailscale2otel
    main: ./cmd/tailscale2otel
    binary: tailscale2otel
    env:
      - CGO_ENABLED=0
      # Registers the goroutineleak pprof profile, pushed to Pyroscope by default
      # (the profiling code guards on availability). Keep in sync with
      # deploy/Dockerfile. Verified to cross-compile across the release matrix.
      - GOEXPERIMENT=goroutineleakprofile
    flags:
      - -trimpath
    ldflags:
      # Matches deploy/Dockerfile. {{ .Version }} is the tag without the leading
      # "v" (e.g. 1.2.3), aligning the binary's reported version with the image
      # tags produced below.
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      # Match the previous release matrix (no windows/arm64 build).
      - goos: windows
        goarch: arm64

archives:
  - id: tailscale2otel
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

# Deterministic version for `--snapshot` builds (CI goreleaser-snapshot job and
# local dry runs). Real tagged releases use the git tag, not this template.
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

sboms:
  - id: archives
    artifacts: archive

# NOTE: this file deliberately has NO docker/dockers_v2 pipeline. The published
# multi-arch GHCR image is built from deploy/Dockerfile by the `publish` job's
# shared container-publish.yml reusable, not by GoReleaser — see deploy/CLAUDE.md.
# A dockers_v2/docker_signs pair pointed at deploy/Dockerfile.goreleaser existed
# here previously but was unreachable on every real CI path (release-please.yml's
# `binaries` job always passes --skip=docker; ci.yml's snapshot job disabled it via
# IsSnapshot) and had already drifted from deploy/Dockerfile. It was removed rather
# than fixed to avoid a future double-publish race against container-publish.yml if
# --skip=docker were ever dropped. Do not re-add a docker pipeline here without also
# removing the image build from publish.yml/container-publish.yml.

# Keyless cosign signatures (GitHub OIDC) for the binary checksums file. Requires
# id-token: write and cosign v3+ on PATH (sigstore/cosign-installer in
# release-please.yml's `binaries` job).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
