# tailscale2otel example configuration.
# Strings support ${ENV} / $ENV expansion, so keep secrets in environment variables.

log_level: info                      # debug | info | warn | error

tailscale:
  # Your tailnet's name, or "-" for the default tailnet of the auth principal.
  tailnet: "${TS_TAILNET}"
  auth:
    method: oauth                    # oauth (recommended) | apikey
    oauth:
      client_id: "${TS_OAUTH_CLIENT_ID}"
      client_secret: "${TS_OAUTH_CLIENT_SECRET}"
      scopes: ["all:read"]           # least-privilege read scopes
      token_url: "https://api.tailscale.com/api/v2/oauth/token"
    apikey: "${TS_API_KEY}"          # used only when method: apikey
  http:
    timeout: 30s
    retry: { max_attempts: 4, base_delay: 500ms, max_delay: 10s }
    rate_limit: 0                    # global requests/sec across all collectors (0 = unlimited)

otlp:
  protocol: http                     # http | grpc | stdout (stdout = local debug)
  endpoint: "https://otlp-gateway-prod-us-central-0.grafana.net/otlp"
  # Convenience for Grafana Cloud: expands to an "Authorization: Basic <base64(instance:token)>" header.
  grafana_cloud:
    instance_id: "${GC_INSTANCE_ID}"
    token: "${GC_OTLP_TOKEN}"
  headers: {}                        # extra raw headers (alternative to grafana_cloud)
  tls: { insecure: false, ca_file: "", cert_file: "", key_file: "" }
  metric_interval: 60s               # how often metrics are pushed (aligned with the default 60s scrape cadence)

enrichment:
  cache_ttl: 5m                      # staleness alarm threshold for the device cache

cardinality:
  flow_include_ports: false          # keep ports OFF flow metrics (always on flow logs)
  flow_node_dims: true               # include src/dst device names on flow metrics
  collapse_external: true            # bucket unresolved IPs as external/unknown

collectors:
  # source: poll | stream | both  (stream uses the receiver below)
  devices:   { enabled: true, interval: 60s, collect_routes: false, collect_posture: false }
  # max_log_records_per_window caps flow LOG records per poll window (0 = unlimited);
  # excess is counted into tailscale.network.flow.logs_dropped. Metrics are never capped.
  flowlogs:  { enabled: true, source: poll, interval: 60s, lag: 120s, initial_lookback: 5m, max_window: 1h, log_mode: per_connection, max_log_records_per_window: 0 }
  auditlogs: { enabled: true, source: poll, interval: 60s, lag: 60s,  initial_lookback: 5m, max_window: 6h }
  users:     { enabled: true, interval: 300s }
  keys:      { enabled: true, interval: 300s, expiry_warn: 168h }   # warn when a key expires within 7d
  settings:  { enabled: true, interval: 600s }
  acl:       { enabled: true, interval: 600s }
  dns:       { enabled: true, interval: 600s }
  # Optional: scrape tailscaled per-node Prometheus /metrics endpoints and forward
  # them centrally over OTLP (counters as deltas, gauges as gauges, plus a per-target
  # tailscale.node.up gauge). Node identity is carried as the "instance" label, not an
  # OTEL Resource. Off by default; disabled when no targets are configured.
  node_metrics:
    enabled: false
    interval: 60s
    timeout: 10s
    targets: []
      # - url: "http://100.64.0.10:5252/metrics"
      #   instance: "relay-1"          # defaults to the URL host:port if omitted
      #   labels: { role: "relay" }    # extra static labels merged onto every series
      # Optional per-target auth/TLS for PROXIED/HTTPS targets (native tailscaled
      # endpoints are plain HTTP and need none of this):
      # - url: "https://relay-2.ts.net:5252/metrics"
      #   bearer_token_file: "/run/secrets/scrape-token"   # read fresh each scrape; or bearer_token: "..."
      #   headers: { X-Scope-OrgID: "1" }
      #   tls: { ca_file: "/etc/ssl/ca.pem", server_name: "relay-2.ts.net", insecure_skip_verify: false }

checkpoint:
  store: memory                      # memory | file
  file_path: "/var/lib/tailscale2otel/checkpoints.json"

# Optional Splunk-HEC-compatible receiver for streamed logs (set a collector's source to stream).
streaming:
  enabled: false
  listen: ":8088"
  path: "/services/collector/event"
  token: "${TS_STREAM_HEC_TOKEN}"    # expected as 'Authorization: Splunk <token>'
  public_url: ""                     # externally reachable receiver URL; REQUIRED when auto_configure: true
  tls: { cert_file: "", key_file: "" }   # HTTPS is required by Tailscale; a `tailscale cert` works for private endpoints
  decompress: auto                   # auto | gzip | zstd | none
  # PUT this receiver as a Splunk-HEC log-streaming sink on startup. Needs enabled:
  # true, public_url, and an OAuth client with the log_streaming scope. Off by default.
  auto_configure: false
  max_body_bytes: 0                  # cap on DECOMPRESSED body; 0 = 64MiB default, <0 = unlimited (413 on exceed)

# Optional webhook receiver for real-time Tailscale events.
webhook:
  enabled: false
  listen: ":8089"
  path: "/tailscale/webhook"
  secret: "${TS_WEBHOOK_SECRET}"     # HMAC-SHA256 verification
  dedup_audit_events: false          # best-effort: drop a webhook event already counted via the audit logs

self_observability:
  enabled: true                      # emit the exporter's own health metrics

# Always-on admin HTTP server for liveness/readiness probes (carries no Tailscale data).
admin:
  enabled: false
  listen: ":9090"                    # serves /healthz and /readyz
