# tailscale2otel configuration.
#
# Configuration is layered: built-in defaults < this file < environment variables.
# EVERY field can be set (or overridden) by an environment variable named with the
# TS2OTEL_ prefix and "__" between nesting levels, e.g.
#
#   tailscale.auth.oauth.client_secret  ->  TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_SECRET
#   otlp.endpoint                       ->  TS2OTEL_OTLP__ENDPOINT
#   collectors.flowlogs.interval        ->  TS2OTEL_COLLECTORS__FLOWLOGS__INTERVAL
#
# Keep SECRETS in environment variables — the env layer overrides this file, so a
# secret never has to appear here. This file is optional: with no -config flag the
# exporter runs from defaults + environment alone (handy for containers).
#
# Every option below is shown with its default value and an explanatory comment.
# Most users only need to set tailscale.* + otlp.* and leave the rest at defaults.
# Prose reference: docs/configuration.md.

log_level: info                       # exporter's own log verbosity: debug | info | warn | error

provider: tailscale                   # control-plane backend: tailscale (default) | headscale

# ── Headscale connection (only used when provider: headscale) ───────────────────
# Under provider: headscale only the devices/users/keys/acl/nodemetrics collectors
# run; the Tailscale-only collectors (flowlogs, auditlogs, services, webhooks,
# contacts, posture_integrations, log_stream, settings, dns) auto-disable.
headscale:
  url: ""                             # Headscale control-plane base URL, e.g. https://headscale.example.org (TS2OTEL_HEADSCALE__URL)
  api_key: ""                         # Bearer API key — keep in env (TS2OTEL_HEADSCALE__API_KEY)
  http:                               # HTTP client used for all Headscale API calls
    timeout: 30s                      # per-request timeout (the ONLY http knob applied in v1)
    retry:                            # accepted for parity with tailscale.http but NOT applied by the minimal v1 Headscale client
      max_attempts: 0
      base_delay: 0s
      max_delay: 0s
    rate_limit: 0
# Tip: to scrape Headscale's own SERVER metrics (the control plane, default :9090 —
# NOT a per-node tailscaled :5252 endpoint), add it as a static node_metrics target:
#   node_metrics:
#     enabled: true
#     targets:
#       - url: http://headscale:9090/metrics
#         instance: headscale-server

# ── Tailscale API connection ────────────────────────────────────────────────────
tailscale:
  tailnet: "-"                        # "-" = the authenticated principal's default tailnet (works out of the box); or set your tailnet's name explicitly, e.g. "example.com"
  auth:
    method: oauth                     # oauth (recommended) | apikey
    oauth:                            # used when method: oauth — scoped, short-lived, not user-bound
      client_id: ""                   # OAuth client ID (set via TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_ID)
      client_secret: ""               # OAuth client secret — keep in env, not here (..._CLIENT_SECRET)
      scopes:                         # least-privilege read scopes requested for the token
        - all:read
    apikey: ""                        # personal API key (set via TS2OTEL_TAILSCALE__AUTH__APIKEY); used only when method: apikey — expires <=90d and is tied to its creator
  http:                               # HTTP client used for all Tailscale API calls
    timeout: 30s                      # per-attempt timeout (each retry attempt; a retried request may take longer, and long Retry-After waits are honored)
    retry:
      max_attempts: 4                 # total attempts per request (1 = no retry); exponential backoff between tries
      base_delay: 500ms               # initial backoff delay
      max_delay: 10s                  # backoff ceiling
    rate_limit: 0                     # global requests/sec across ALL collectors (0 = unlimited)

# ── OTLP export destination ─────────────────────────────────────────────────────
otlp:
  protocol: http                      # http | grpc | stdout (stdout = print signals to the console for local debug, no backend)
  endpoint: https://otlp-gateway-prod-us-central-0.grafana.net/otlp   # OTLP base URL (the exporter appends /v1/metrics and /v1/logs itself)
  grafana_cloud:                      # convenience: instance_id + token become an "Authorization: Basic" header for Grafana Cloud
    instance_id: ""                   # Grafana Cloud stack/instance ID (set via TS2OTEL_OTLP__GRAFANA_CLOUD__INSTANCE_ID)
    token: ""                         # Grafana Cloud OTLP token — keep in env (..._GRAFANA_CLOUD__TOKEN)
  headers: {}                         # extra raw OTLP headers, e.g. {X-Scope-OrgID: "1"} (alternative to grafana_cloud); FILE-ONLY (maps aren't settable via env)
  tls:
    insecure: false                   # skip TLS certificate verification (debugging only — do not use in production)
    ca_file: ""                       # path to a custom CA bundle to trust
    cert_file: ""                     # client certificate path (for mutual TLS)
    key_file: ""                      # client private key path (for mutual TLS)
  metric_interval: 60s                # how often metrics are pushed (60s aligns with a 1-data-point-per-minute scrape)

# ── Enrichment (device-name cache + optional reverse DNS) ───────────────────────
enrichment:
  cache_ttl: 5m                       # staleness alarm threshold for the IP/nodeID -> name device cache
  reverse_dns:                        # opt-in PTR enrichment: resolve EXTERNAL (non-Tailscale) flow IPs to hostnames
    enabled: false                    # off by default (can add ~one flow-metric series per external IP when on)
    server: ""                        # resolver "ip" or "ip:port" (default :53); empty = system/container resolver
    timeout: 2s                       # per-lookup timeout
    cache_ttl: 24h                    # how long a resolved name is cached (PTRs rarely change, so a long TTL keeps resolver load low)
    negative_ttl: 5m                  # how long a failed lookup is remembered (suppresses retries)
    max_entries: 50000                # PTR cache size bound (new external IPs beyond this are not resolved; ~150 bytes/entry)

# ── Cardinality (metric/label volume trade-offs) ────────────────────────────────
cardinality:
  metric_limit: 10000                 # hard per-metric series cap; beyond it the SDK collapses extras into otel_metric_overflow (0/negative = unlimited)
  derp_region_rollup: true            # emit tailnet-wide per-DERP-region rollup gauges (tailscale.derp.region.*)
  subnet_route_rollup: true           # emit per-CIDR tailscale.subnet_routes.routers redundancy gauge (one series per subnet CIDR); fleet exit/subnet counts emit regardless
  flow:                               # shapes flow METRICS only — flow LOGS always carry full detail
    metrics_mode: rollup              # rollup (bounded top-N, lowest cardinality) | all (raw per-connection) | both (≈2x series; summing double-counts)
    rollup_top_n: 500                 # rollup mode: busiest src/dst node pairs kept per flush; the rest fold into an __other__ series (0 = default 500)
    source_port: false                # add source.port to flow metrics (raw modes only)
    destination_port: false           # add destination.port to flow metrics (raw modes only)
    destination_service: false        # add tailscale.dst.service (IANA name, e.g. tcp/443->https) to flow metrics
    node_dims: true                   # include src/dst device names on flow metrics
    collapse_external: true           # bucket unresolved IPs as external/unknown (keeps cardinality bounded)
    exit_node_attribution: true       # emit bounded tailscale.exit_node.io/packets attributing exit traffic to the relaying node (bounded by exit-node count)
  per_entity:                         # emit one gauge series per entity (true) or only the aggregate *.count (false)
    device: true                      # per-device gauges (online/last_seen/key_expiry/derp/routes)
    user: true                        # per-user gauges (devices/connected/last_seen)
    key: true                         # per-key expiry gauge (the expiry WARN log fires regardless)
    webhook: true                     # per-endpoint webhook-subscriptions gauge
    service: true                     # per-service ports/hosts gauges

# ── Collectors ──────────────────────────────────────────────────────────────────
# Each collector takes enabled + interval. The two LOG collectors (flowlogs,
# auditlogs) also take a source and windowing fields. Pick exactly ONE ingestion
# path per log type (source: poll OR stream) to avoid double-counting.
collectors:
  devices:                            # device inventory — REQUIRED for flow/audit IP->name enrichment (disabling it degrades names to unknown/external)
    enabled: true
    interval: 60s                     # how often the device snapshot is polled
    collect_routes: false             # also fetch advertised/primary subnet routes per device
    collect_connectivity: true        # emit per-device NAT/connectivity health (hard_nat/endpoints/direct_capable/udp/ipv6) + fleet rollups from the device payload (no extra API calls)
    collect_posture: false            # also fetch device posture (MDM/EDR) — enables the posture metrics + log
    collect_device_invites: true      # also fetch outstanding device share invites per device (one extra API call per device, N+1); emits tailscale.device_invites.count
    posture_log_mode: changes         # needs collect_posture: changes (log only on change) | always (every scrape) | off (no log); the posture METRIC is always emitted
    attribute_namespaces:             # needs collect_posture: posture-key namespaces promoted to attribute metrics; ["*"] = all, [] = disable
      - intune
      - jamf
      - kandji
      - crowdstrike
      - sentinelone
      - kolide
      - ip
    collect_tag_rollup: true          # emit tailscale.devices.by_tag (one series per ACL tag); false keeps the other fleet-hygiene aggregates
    tag_rollup_limit: 50              # cap distinct tag series on by_tag; busiest N kept, rest fold into tag="__other__" (0/negative = unlimited)
  flowlogs:                           # network flow logs -> traffic counters + per-connection logs
    enabled: true
    source: poll                      # poll (this exporter PULLS) | stream (Tailscale PUSHES to the streaming receiver) | both (discouraged: double-counts)
    interval: 60s                     # poll only — how often a window is polled
    lag: 120s                         # poll only — query only up to now-lag so late-arriving records aren't missed
    initial_lookback: 5m              # poll only — cold-start reach-back when there is no checkpoint yet
    max_window: 1h                    # poll only — cap one tick's window so a long outage catches up over several ticks
    log_mode: per_connection          # per_connection | per_record | off — log detail level (applies to poll AND stream)
    max_log_records_per_window: 0     # cap flow LOG records per window (0 = unlimited); excess -> tailscale.network.flow.logs_dropped (metrics are never capped)
  auditlogs:                          # configuration/audit events -> event logs + a counter
    enabled: true
    source: poll                      # poll | stream | both (see flowlogs)
    interval: 60s                     # poll only
    lag: 60s                          # poll only
    initial_lookback: 5m              # poll only
    max_window: 6h                    # poll only
  users:                              # user inventory (devices/connected/last_seen per user)
    enabled: true
    interval: 300s
  keys:                               # auth-key inventory + expiry warnings
    enabled: true
    interval: 300s
    expiry_warn: 168h                 # log a WARN when a key expires within this window (default 7d)
  settings:                           # tailnet settings snapshot
    enabled: true
    interval: 600s
  acl:                                # ACL policy snapshot
    enabled: true
    interval: 600s
  dns:                                # DNS/MagicDNS settings snapshot
    enabled: true
    interval: 600s
  contacts:                           # account/support/security contact verification status (no emails emitted)
    enabled: true
    interval: 600s
  webhooks:                           # webhook-endpoint inventory: count + per-endpoint subscription count (no url/secret)
    enabled: true
    interval: 600s
  posture_integrations:               # MDM/EDR posture-integration sync health: matched counts + last_sync staleness
    enabled: true
    interval: 600s
  log_stream:                         # log-streaming delivery health to a SIEM sink (self-gates to configured=0 when no sink)
    enabled: true
    interval: 600s
  services:                           # Tailscale Services (VIP) inventory
    enabled: true
    interval: 600s
    collect_hosts: false              # also fetch per-service backing-host detail — one extra API call per service (N+1)
  node_metrics:                       # OPTIONAL: scrape tailscaled per-node Prometheus /metrics and forward them centrally. Off by default; see docs/node-metrics.md
    enabled: false
    interval: 60s                     # how often each target is scraped
    timeout: 10s                      # per-scrape HTTP timeout
    max_response_bytes: 4194304       # per-target response cap (4 MiB) — bounds memory
    max_samples: 50000                # per-target sample cap per scrape — bounds cardinality
    targets: []                       # static targets (FILE-ONLY — a list of objects can't be set via env). Example:
      # - url: http://100.64.0.10:5252/metrics
      #   instance: relay-1           # identity label; defaults to the URL host:port
      #   labels: { role: relay }     # extra static labels merged onto every series
      #   bearer_token_file: /run/secrets/scrape-token   # or bearer_token: "..." (for proxied/HTTPS targets)
      #   headers: { X-Scope-OrgID: "1" }
      #   tls: { ca_file: /etc/ca.pem, server_name: relay.ts.net, insecure_skip_verify: false }
    metric_allow: []                  # if non-empty, only forwarded metric names matching one of these anchored regexes are kept
    metric_deny: []                   # forwarded metric names matching any of these anchored regexes are dropped (after allow)
    drop_labels: []                   # label keys stripped from every forwarded series (the instance label is never dropped)
    discovery:                        # OPTIONAL: discover scrape targets from the Tailscale devices API (unioned with static targets)
      enabled: false
      interval: 5m                    # how often the device inventory is re-scanned for targets
      max_targets: 1000               # cap discovered targets per refresh
      scheme: http                    # http | https — metrics endpoint scheme on each device
      port: 5252                      # tailscaled client-metrics port
      path: /metrics                  # metrics endpoint path
      online_only: true               # only devices currently connected to the control plane
      exclude_external: true          # skip shared/external devices
      include_tags: []                # only devices with one of these tags (empty = all), e.g. ["tag:server"]
      exclude_tags: []                # devices with any of these tags are skipped (wins over include_tags)
      address_order: ipv4             # ipv4 | ipv6 — preferred address family (falls back to the other)
      instance_source: name           # identity label per target: name (MagicDNS short name, unique+friendly — default) | address (Tailscale host:port, always unique) | hostname (OS hostname, NOT unique — collisions like "localhost" are auto-suffixed)
      include_host_labels: true       # attach host.name/host.id for joins with tailscale.device.*
      include_tags_label: true        # attach tailscale.tags to each target's series

# ── Checkpointing (resume polled log collectors after a restart) ────────────────
checkpoint:
  store: file                         # file (persists window cursors across restarts; falls back to memory + WARN if the path isn't writable) | memory (RAM only; cold-starts from initial_lookback after a restart)
  file_path: /var/lib/tailscale2otel/checkpoints.json   # used when store: file — mount a writable, persistent path here (the dir is auto-created)

# ── Streaming receiver (OPTIONAL: RECEIVE logs instead of polling) ──────────────
# When enabled, set collectors.{flowlogs,auditlogs}.source to stream so each log
# type is ingested by exactly one path.
streaming:
  enabled: false                      # run the Splunk-HEC receiver to INGEST pushed logs (set the relevant collectors' source: stream)
  listen: ":8088"                     # bind address for the Splunk-HEC-compatible receiver
  path: /services/collector/event     # HEC endpoint path Tailscale POSTs to
  token: ""                           # expected as "Authorization: Splunk <token>" (set via TS2OTEL_STREAMING__TOKEN); empty = unauthenticated (WARN)
  public_url: ""                      # externally reachable receiver URL; REQUIRED only when auto_configure: true
  tls:
    cert_file: ""                     # HTTPS cert (Tailscale requires HTTPS; a `tailscale cert` works for private endpoints)
    key_file: ""                      # HTTPS key
  decompress: auto                    # auto | gzip | zstd | none — request body decompression
  auto_configure: false               # on startup, register THIS receiver as the tailnet's log-streaming sink (needs enabled + public_url + the log_streaming OAuth scope)
  max_body_bytes: 0                   # cap on the DECOMPRESSED body; 0 = 64 MiB default, negative = unlimited (over-cap = 413)

# ── Webhook receiver (OPTIONAL: real-time Tailscale events) ─────────────────────
webhook:
  enabled: false                      # run the receiver for real-time Tailscale webhook events
  listen: ":8089"                     # bind address for the webhook receiver
  path: /tailscale/webhook            # endpoint path Tailscale POSTs events to
  secret: ""                          # HMAC-SHA256 verification secret (set via TS2OTEL_WEBHOOK__SECRET); empty = verification SKIPPED (WARN)
  tolerance: 5m                       # reject signed timestamps older than this (replay window); "0" disables the check
  dedup_audit_events: false           # best-effort: drop a webhook event already counted via the audit logs

# ── Self-observability (the exporter's own health telemetry) ────────────────────
self_observability:
  enabled: true                       # emit tailscale2otel.up, api.requests, runtime metrics, etc.
  instance_id: ""                     # service.instance.id resource attr; empty => host name. Set via env, e.g. TS2OTEL_SELF_OBSERVABILITY__INSTANCE_ID=$POD_NAME

# ── Admin HTTP server (OPTIONAL: probes + status page + pprof mount) ────────────
# Bind to a loopback/tailnet address, not the public internet. /healthz and /readyz
# are never authenticated so health checks keep working.
admin:
  enabled: false                      # run the admin HTTP server (probes + status page + optional pprof mount)
  listen: ":9090"                     # serves /healthz, /readyz, and the status page
  landing_page: true                  # serve the human status page at / and machine-readable /api/status.json
  auth:
    token: ""                         # gate the status page + pprof behind this token (set via TS2OTEL_ADMIN__AUTH__TOKEN); empty = open status page (WARN on a wildcard bind)

# ── Profiling (OPTIONAL: all off by default, carries no Tailscale data) ─────────
profiling:
  pprof:
    enabled: false                    # mount net/http/pprof on the admin server (REQUIRES admin.enabled + admin.auth.token — heap dumps can expose in-memory secrets)
  pyroscope:
    enabled: false                    # run the Pyroscope continuous-profiling push agent
    server_address: ""                # REQUIRED when enabled, e.g. http://pyroscope:4040 or https://profiles-prod-NNN.grafana.net
    basic_auth_user: ""               # Grafana Cloud: the profiles instance ID (set via TS2OTEL_PROFILING__PYROSCOPE__BASIC_AUTH_USER)
    basic_auth_password: ""           # Grafana Cloud: a profiles:write access-policy token (..._BASIC_AUTH_PASSWORD)
    tenant_id: ""                     # X-Scope-OrgID for multi-tenant servers (leave empty for Grafana Cloud)
    upload_rate: 60s                  # how often profiles are flushed
    tags: {}                          # extra static labels merged onto every profile, e.g. { env: prod }
  mutex_profile_fraction: 0           # runtime.SetMutexProfileFraction (0 = disabled)
  block_profile_rate: 0               # runtime.SetBlockProfileRate (0 = disabled)

# ── OTEL traces (third signal pillar, OFF by default) ───────────────────────────
# Emits spans for the exporter's own work: one root span per collector scrape
# cycle, a child span per Tailscale API request (with retry/auth span events), and
# one span per HEC-stream / webhook receiver request. Reuses otlp.* for the
# endpoint/protocol/headers/TLS. When enabled, trace exemplars are also attached
# to tailscale2otel.api.duration.
tracing:
  enabled: false                       # emit spans. TS2OTEL_TRACING__ENABLED
  sampler: parentbased_always_on       # head sampler: always_on|always_off|traceidratio|parentbased_always_on|parentbased_traceidratio. TS2OTEL_TRACING__SAMPLER
  sampler_arg: 1.0                     # sample ratio in [0,1] for the *traceidratio samplers (ignored otherwise). TS2OTEL_TRACING__SAMPLER_ARG

# ── Version checks (OPTIONAL: outbound "is a newer release available?" checks) ──
# Both sub-checks make external HTTPS calls and are fail-open (a failed/blocked fetch
# silently emits nothing). Disable both for air-gapped deployments.
version_checks:
  self:
    enabled: true                     # emit tailscale2otel.update_available (running build vs latest tailscale2otel GitHub release)
  devices:
    enabled: true                     # emit per-device tailscale.device.version_skew + fleet rollups (device client version vs latest Tailscale stable). Needs the devices collector.
    outdated_minor_threshold: 3       # a device this many minor releases behind counts toward tailscale.devices.outdated
  cache_ttl: 1h                       # how long a fetched "latest version" is cached before re-fetching (minimum 5m)
  timeout: 10s                        # per-request timeout for the external version fetch
