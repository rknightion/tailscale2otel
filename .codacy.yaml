---
# Repo-local Codacy configuration.
#
# Tool selection and patterns are governed centrally by the organization
# "rknightion-standard" coding standard (Codacy Cloud), NOT by this file — do
# not add a `tools:`/`patterns:` block here. This file only narrows WHAT Codacy
# analyzes: Codacy Cloud reads `exclude_paths` from the default branch to skip
# generated, vendored, and test files that would otherwise add noise.
#
# Glob syntax is Java-style (`**` spans directories). See
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/
exclude_paths:
  # --- shared convention (kept in sync across rknightion repos) ---
  - "docs/**"          # user + generated docs (docs/metrics.md, docs/env-vars.md, docs site)
  - "test/**"          # test trees
  - "**/*_test.go"     # Go test files — high-churn, trip complexity/security rules
  - "vendor/**"        # vendored deps (none today; future-proofing)
  - "**/*.gen.go"      # code-generated Go (none today; future-proofing)
  - "**/generated/**"  # any generated/ tree (future-proofing)

  # --- repo-specific generated / vendored artifacts ---
  - "deploy/helm/**/README.md"             # generated by helm-docs (fail-on-diff in CI)
  - "deploy/helm/**/values.schema.json"    # generated by helm-values-schema-json
  - "spec/tailscale-api.json"              # vendored upstream Tailscale OpenAPI spec
