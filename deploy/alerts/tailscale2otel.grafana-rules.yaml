            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum by (tailscale_tailnet) (rate(tailscale2otel_api_requests_total{http_response_status_code=~\"4..|5..\", tailscale_tailnet!=\"\"}[10m]))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
