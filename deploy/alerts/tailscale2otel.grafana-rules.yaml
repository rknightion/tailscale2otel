  - orgId: 1
    name: "tailscale2otel-network"
    folder: "tailscale2otel"
    interval: "1m"
    rules:
      - uid: "ts2o-high-derp-relay-usage"
        title: "High DERP relay usage"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum(rate(tailscaled_inbound_bytes_total{path=\"derp\"}[10m]) + rate(tailscaled_outbound_bytes_total{path=\"derp\"}[10m])) / clamp_min(sum(rate(tailscaled_inbound_bytes_total[10m]) + rate(tailscaled_outbound_bytes_total[10m])), 1)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0.5
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "30m"
        labels:
          severity: "warning"
          service: "tailscale2otel"
        annotations:
          summary: "Most tailnet traffic is relayed via DERP, not direct"
          description: "Over 50% of fleet bytes are relayed via DERP rather than sent peer-to-peer for 30m — a NAT-traversal/connectivity problem adding latency. Requires the node-metrics scraper (absent => not firing)."
        isPaused: false
      - uid: "ts2o-derp-region-latency-high"
        title: "DERP region latency high"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "max by (tailscale_derp_region) (tailscale_derp_region_latency_min_seconds)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 0.15
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "15m"
        labels:
          severity: "info"
          service: "tailscale2otel"
        annotations:
          summary: "Best latency to DERP region {{ $labels.tailscale_derp_region }} is high"
          description: "Even the best device->DERP latency for region {{ $labels.tailscale_derp_region }} exceeds 150ms — poor connectivity to that region. Gated by cardinality.derp_region_rollup."
        isPaused: true
      - uid: "ts2o-no-flow-data"
        title: "No flow data"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum(rate(tailscale_network_flows_total[30m]))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "lt"
                    params:
                      - 0.0001
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "1h"
        labels:
          severity: "info"
          service: "tailscale2otel"
        annotations:
          summary: "No network flow records for an hour"
          description: "sum(rate(tailscale_network_flows_total[30m])) ~ 0 for 1h while flow logging is on — the flow pipeline may be stalled (or the tailnet is genuinely idle; tune/disable as needed). Absent when flow logging is off."
        isPaused: true
  - orgId: 1
    name: "tailscale2otel-recording"
    folder: "tailscale2otel"
    interval: "1m"
    rules:
      - uid: "ts2o-rec-devices-online"
        title: "tailscale:devices_online:count"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "count(max by (host_id) (tailscale_device_online_ratio) == 1)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale:devices_online:count"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Fleet devices currently online (deploy-stable count)."
        isPaused: true
      - uid: "ts2o-rec-posture-autoupdate"
        title: "tailscale:posture_autoupdate:ratio"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "count(max by (host_id) (tailscale_device_posture_ratio{auto_update=\"true\"})) / clamp_min(count(max by (host_id) (tailscale_device_posture_ratio)), 1)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale:posture_autoupdate:ratio"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Fraction of devices with client auto-update enabled (feeds PostureAutoUpdateLow + the Security tab)."
        isPaused: false
      - uid: "ts2o-rec-posture-encrypted"
        title: "tailscale:posture_encrypted:ratio"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "count(max by (host_id) (tailscale_device_posture_ratio{encrypted=\"true\"})) / clamp_min(count(max by (host_id) (tailscale_device_posture_ratio)), 1)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale:posture_encrypted:ratio"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Fraction of devices reporting an encrypted local state store."
        isPaused: false
      - uid: "ts2o-rec-derp-byte-fraction"
        title: "tailscale:derp_relay:byte_fraction"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum(rate(tailscaled_inbound_bytes_total{path=\"derp\"}[10m]) + rate(tailscaled_outbound_bytes_total{path=\"derp\"}[10m])) / clamp_min(sum(rate(tailscaled_inbound_bytes_total[10m]) + rate(tailscaled_outbound_bytes_total[10m])), 1)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale:derp_relay:byte_fraction"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Fleet fraction of bytes relayed via DERP (precomputes the heavy 4-rate dashboard/alert query)."
        isPaused: false
      - uid: "ts2o-rec-flow-throughput"
        title: "tailscale:flow_throughput:bytes:rate5m"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum(rate(tailscale_network_io_rollup_bytes_total[5m])) or sum(rate(tailscale_network_io_bytes_total[5m]))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale:flow_throughput:bytes:rate5m"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Total flow throughput (rollup if present, else raw)."
        isPaused: true
      - uid: "ts2o-rec-series-active-sum"
        title: "tailscale2otel:series_active:sum"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum(max by (metric_name) (tailscale2otel_series_active))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale2otel:series_active:sum"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Total active series across all tailscale2otel metrics — an ingest-cost proxy."
        isPaused: false
      - uid: "ts2o-rec-keys-expiring-7d"
        title: "tailscale:device_keys_expiring_7d:count"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "count((max by (host_id) (tailscale_device_key_expiry_seconds) - time() < 7*86400) and (max by (host_id) (tailscale_device_key_expiry_seconds) - time() > 0))"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
        record:
          metric: "tailscale:device_keys_expiring_7d:count"
          from: "A"
        labels:
          service: "tailscale2otel"
        annotations:
          description: "Device node keys expiring within 7 days (and not already expired)."
        isPaused: true
