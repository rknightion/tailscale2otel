                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "30m"
        labels:
          severity: "warning"
          service: "tailscale2otel"
          domain: "infra"
          skipinvestigation: "true"
        annotations:
          summary: "Most tailnet traffic is relayed via DERP, not direct"
          description: "Over 50% of fleet bytes are relayed via DERP rather than sent peer-to-peer for 30m — a NAT-traversal/connectivity problem adding latency. Requires the node-metrics scraper (absent => not firing)."
