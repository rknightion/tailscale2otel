                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "sum(label_replace(rate(tailscaled_inbound_bytes_total{path=\"derp\"}[10m]), \"dir\", \"in\", \"\", \"\") or label_replace(rate(tailscaled_outbound_bytes_total{path=\"derp\"}[10m]), \"dir\", \"out\", \"\", \"\")) / clamp_min(sum(label_replace(rate(tailscaled_inbound_bytes_total[10m]), \"dir\", \"in\", \"\", \"\") or label_replace(rate(tailscaled_outbound_bytes_total[10m]), \"dir\", \"out\", \"\", \"\")), 1)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
