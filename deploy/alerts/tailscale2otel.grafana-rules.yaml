  - orgId: 1
    name: "tailscale2otel-integrations"
    folder: "tailscale2otel"
    interval: "1m"
    rules:
      - uid: "ts2o-posture-integration-stale"
        title: "Posture integration sync stale"
        condition: "C"
        data:
          - refId: "A"
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "grafanacloud-prom"
            model:
              datasource:
                type: "prometheus"
                uid: "grafanacloud-prom"
              editorMode: "code"
              expr: "max by (tailscale_posture_provider, tailscale_posture_integration) (time() - tailscale_posture_integration_last_sync_seconds)"
              instant: false
              range: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: "A"
          - refId: "B"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "A"
              reducer: "last"
              type: "reduce"
              refId: "B"
          - refId: "C"
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "__expr__"
            model:
              datasource:
                type: "__expr__"
                uid: "__expr__"
              expression: "B"
              type: "threshold"
              conditions:
                - type: "query"
                  evaluator:
                    type: "gt"
                    params:
                      - 86400
                  operator:
                    type: "and"
                  query:
                    params:
                      - "C"
                  reducer:
                    type: "last"
                    params: []
              refId: "C"
        noDataState: "OK"
        execErrState: "OK"
        for: "1h"
        labels:
          severity: "warning"
          service: "tailscale2otel"
          domain: "security"
        annotations:
          summary: "Posture integration {{ $labels.tailscale_posture_provider }} sync is stale"
          description: "A device-posture (MDM/EDR) integration has not synced in over 24h ({{ $labels.tailscale_posture_provider }}/{{ $labels.tailscale_posture_integration }}) — posture data from it is stale. Absent until an integration exists. NOTE: Tailscale updates last_sync on every sync *attempt*, including failures, so this alert cannot detect a persistently-failing-but-still-retrying integration (bad/revoked credentials) — see ts2o-posture-integration-error for that case (#99)."
        isPaused: false
