apiVersion: v2
name: tailscale2otel
description: Tailscale exporter for OpenTelemetry and Prometheus — device fleet, network flow logs and audit logs over OTLP. Grafana Cloud ready. Headscale supported.
type: application
# Chart version — bump on chart changes.
# 0.9.1: correct the long-stale appVersion (was 0.1.0, tracked nothing) and add
# artifacthub.io/* annotations + icon so the OCI chart renders properly on Artifact Hub.
# 0.7.6: add podSecurityContext.fsGroup (65532, OnRootMismatch) so the opt-in PVC
# persistence path is reliably writable regardless of the CSI driver's default
# ownership; add extraVolumes/extraVolumeMounts so operators can mount arbitrary
# files (e.g. a streaming.tls cert/key Secret) without forking the chart.
# 0.7.5: default GOMEMLIMIT to ~90% of resources.limits.memory (computed in the
# deployment template) when goRuntime.memLimit is left empty, mirroring the
# docker-compose GOMEMLIMIT backstop so the Helm-deployed pod gets the same
# soft memory ceiling.
# 0.7.4: add conditional liveness/readiness probes (/healthz, /readyz on the admin
# port), rendered only when config.admin.enabled — addresses Snyk IaC SNYK-CC-K8S-41.
# 0.7.2: security hardening — digest-pin base images, checksum/secret annotation,
# NOTES.txt key-name fix, tailnets credential warning.
# 0.5.1: checkpoint.store defaults to `file` (mirrors app default); add persistence.*
# values to create a PVC for durable checkpoint storage (off by default, uses emptyDir).
# The Dockerfile pre-seeds /var/lib/tailscale2otel owned by nonroot (65532) and
# docker-compose gains a named `checkpoints` volume so persistence works out of the box.
# 0.5.0: BREAKING — switch to layered config (defaults < file < env vars). Secret
# keys renamed to systematic TS2OTEL_* convention (e.g. TS_OAUTH_CLIENT_SECRET ->
# TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_SECRET). ${VAR} placeholders removed from
# config.yaml (secrets injected via env override, never in the ConfigMap). Cardinality
# restructured: cardinality.flow.* and cardinality.per_entity.* replace the flat keys;
# flow_rollup_top_n moved from collectors.flowlogs to cardinality.flow.rollup_top_n.
# 0.4.8: remove the legacy cardinality.flow_include_ports toggle (superseded by the
# granular flow_source_port / flow_destination_port).
# 0.4.5: add goRuntime.{gogc,memLimit} -> GOGC/GOMEMLIMIT container env (Go GC tuning;
# GOGC defaults to 200 to halve GC frequency on this near-idle poller).
# 0.4.1: set container securityContext runAsUser/runAsGroup to 65532 (distroless
# nonroot uid/gid > 10000) to satisfy hardened-cluster policy (trivy KSV-0020/0021).
# 0.4.0: add admin.auth.token (shared-secret gate for the status page + pprof)
# and the ADMIN_TOKEN secret key.
# 0.4.3: flow metrics default to the bounded rollup (cardinality.flow_metrics_mode,
# default rollup) + collectors.flowlogs.flow_rollup_top_n.
# 0.3.0: add admin.landing_page (status page) and the profiling section
# (pprof + Pyroscope push, opt-in) plus PYROSCOPE_* secret keys.
# 0.2.0: BREAKING — the full app config now lives under values.yaml `config:`
# (single source of truth, no chart<->config drift). See CHANGELOG.md.
version: 0.9.1
# Tracks the tailscale2otel app version this chart defaults to.
appVersion: "2.0.2"
home: https://m7kni.io/tailscale2otel/
icon: https://m7kni.io/tailscale2otel/assets/logo.png
sources:
  - https://github.com/rknightion/tailscale2otel
keywords:
  - tailscale
  - headscale
  - opentelemetry
  - otlp
  - otel
  - prometheus
  - prometheus-exporter
  - observability
  - monitoring
  - grafana
  - grafana-cloud
  - flow-logs
  - audit-logs
  - network-monitoring
maintainers:
  - name: rknightion
    url: https://github.com/rknightion
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Documentation
      url: https://m7kni.io/tailscale2otel/
    - name: source
      url: https://github.com/rknightion/tailscale2otel
    - name: Metrics catalog
      url: https://m7kni.io/tailscale2otel/metrics/
    - name: Configuration reference
      url: https://m7kni.io/tailscale2otel/configuration/
  artifacthub.io/maintainers: |
    - name: rknightion
      email: rob@rob-knight.com
