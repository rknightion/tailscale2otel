# Default values for tailscale2otel.

image:
  # -- Container image repository.
  repository: ghcr.io/rknightion/tailscale2otel
  # -- Image tag. Defaults to .Chart.appVersion when empty.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent
# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Replica count. Keep at 1 — this is a singleton poller (no leader election);
# scaling up would double-emit every metric and log.
replicaCount: 1

# -- Override the chart name portion of resource names.
nameOverride: ""
# -- Fully override the generated resource names.
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount.
  create: true
  # -- ServiceAccount name. Generated when empty.
  name: ""
  # -- Annotations to add to the ServiceAccount.
  annotations: {}
  # -- Automount the ServiceAccount API token into the pod. The exporter makes no Kubernetes API calls, so this defaults to false to drop an unused, attacker-useful credential from the network-facing pod.
  automountServiceAccountToken: false

# -- Extra annotations for the pod.
podAnnotations: {}
# -- Extra labels for the pod.
podLabels: {}

# -- Pod-level security context. Runs as non-root with the RuntimeDefault seccomp
# profile; the app needs no special privileges. fsGroup makes the opt-in PVC
# persistence path (persistence.enabled=true) reliably writable by the uid-65532
# container regardless of the CSI driver's default ownership behavior — a freshly
# provisioned block PVC is typically root:root on many drivers. The default
# emptyDir checkpoint volume already works without this (kubelet chmods emptyDir
# roots 0777, and the image pre-seeds /var/lib/tailscale2otel owned by 65532:65532).
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
# -- Container-level security context. Drops all capabilities and runs with a
# read-only root filesystem (the app writes only to the optional checkpoint
# volume). Runs as the distroless `nonroot` uid/gid 65532 (a high, non-system id
# > 10000) to satisfy hardened-cluster policy.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities:
    drop: ["ALL"]

# -- Resource requests and limits. The defaults suit a few-hundred-device tailnet;
# raise limits if you enable high-volume flow-log streaming or many node-metrics
# targets.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Go runtime tuning, injected as container env vars. This is a near-idle poller
# with a tiny live heap, so the Go default GOGC=100 fires frequent (individually
# cheap) collections that dominate the CPU profile; raising GOGC cuts that GC share.
goRuntime:
  # -- GOGC: heap-growth percentage between collections (Go default 100). Empty ("") leaves the Go default.
  gogc: "200"
  # -- GOMEMLIMIT soft memory cap, e.g. "230MiB". Empty ("") auto-computes ~90% of
  # resources.limits.memory (mirrors the docker-compose backstop; e.g. 256Mi -> 230MiB),
  # falling back to unset if that limit is absent or in a unit outside Mi/Gi. Set
  # explicitly to override the computed value.
  memLimit: ""

# -- Node selector for pod scheduling.
nodeSelector: {}
# -- Tolerations for pod scheduling.
tolerations: []
# -- Affinity rules for pod scheduling.
affinity: {}

# -- Extra volumes appended to the pod spec as-is (e.g. a Secret volume holding
# TLS cert/key material for config.streaming.tls, since readOnlyRootFilesystem
# leaves no other place to put arbitrary files). Paired with extraVolumeMounts
# below by volume name. See the chart README for a worked TLS-cert example.
extraVolumes: []
# -- Extra volume mounts appended to the main container's volumeMounts, as-is.
# Paired with extraVolumes above by name.
extraVolumeMounts: []

# --- Secrets ---
# Provide credentials either inline here (rendered into a Secret) OR reference an
# existing Secret via existingSecret. Inline values win only when existingSecret is "".
# -- Name of a pre-created Secret exposing the TS2OTEL_* env keys. When set, no Secret is rendered.
existingSecret: ""
# -- Inline secret values rendered into a Secret and injected via envFrom. These
# TS2OTEL_* keys override the corresponding fields in the ConfigMap config.yaml at
# runtime — secrets never appear in the ConfigMap. Keys left empty ("") are NOT
# rendered into the Secret: an empty env var would override — and blank — the same
# key set under `config:` (env beats file), silently disabling e.g. receiver auth.
secret:
  # -- Tailnet name (e.g. "example.com"), or "-" for the auth principal's default tailnet.
  TS2OTEL_TAILSCALE__TAILNET: ""
  # -- OAuth client ID (recommended auth; needs the "all:read" scope). Used when config.tailscale.auth.method=oauth.
  TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_ID: ""
  # -- OAuth client secret paired with TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_ID.
  TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_SECRET: ""
  # -- Tailscale API key. Used ONLY when config.tailscale.auth.method=apikey. Prefer OAuth: a
  # personal API key expires in <=90 days and is tied to the user that created it (stops working
  # when that user is removed). The exporter logs a WARN when method=apikey.
  TS2OTEL_TAILSCALE__AUTH__APIKEY: ""
  # -- Headscale Bearer API key. Used ONLY when config.provider=headscale.
  TS2OTEL_HEADSCALE__API_KEY: ""
  # -- Grafana Cloud instance/stack ID (the numeric user for OTLP basic auth).
  TS2OTEL_OTLP__GRAFANA_CLOUD__INSTANCE_ID: ""
  # -- Grafana Cloud OTLP token (the password for OTLP basic auth).
  TS2OTEL_OTLP__GRAFANA_CLOUD__TOKEN: ""
  # -- HEC token the streaming receiver expects ("Authorization: Splunk <token>").
  # Set ONLY when you enable config.streaming. Empty makes streaming token auth a no-op.
  TS2OTEL_STREAMING__TOKEN: ""
  # -- Webhook HMAC-SHA256 secret. Set ONLY when you enable config.webhook. CRITICAL: leaving
  # this empty makes config.webhook.secret empty, which SKIPS HMAC verification entirely, so
  # unauthenticated webhook POSTs are accepted. Always set a secret when exposing the webhook.
  TS2OTEL_WEBHOOK__SECRET: ""
  # -- Shared token gating the admin status page (/ and /api/status.json) and pprof. Empty leaves the
  # status page open (a WARN fires if it's exposed on a wildcard bind); REQUIRED when you enable
  # config.profiling.pprof. /healthz and /readyz are never gated.
  TS2OTEL_ADMIN__AUTH__TOKEN: ""
  # -- Token gating the Prometheus /metrics endpoint (HTTP Basic password or "Authorization: Bearer <token>").
  # Empty = open (a WARN fires when prometheus.enabled on a wildcard bind). Set ONLY when prometheus.enabled.
  TS2OTEL_PROMETHEUS__AUTH__TOKEN: ""
  # -- Pyroscope basic-auth user (Grafana Cloud: the profiles instance ID). Set ONLY when you
  # enable config.profiling.pyroscope.
  TS2OTEL_PROFILING__PYROSCOPE__BASIC_AUTH_USER: ""
  # -- Pyroscope basic-auth password (Grafana Cloud: an access policy token with profiles:write).
  TS2OTEL_PROFILING__PYROSCOPE__BASIC_AUTH_PASSWORD: ""

# --- App config ---
# The FULL application config, rendered verbatim into a ConfigMap as config.yaml.
# This is the single source of truth (kept in sync with config.example.yaml).
# Secrets are injected exclusively via TS2OTEL_* environment variables from the
# Secret above — no ${VAR} placeholders appear in the ConfigMap.
# Helm deep-merges maps, so single-key overrides keep working, e.g.:
#   --set config.log_level=debug
#   --set config.collectors.flowlogs.interval=30s
config:
  # -- Log verbosity: debug | info | warn | error.
  log_level: info

  # -- Control-plane backend: tailscale (default) | headscale. Under headscale only the
  # devices/users/keys/acl/nodemetrics collectors run; the Tailscale-only collectors auto-disable.
  provider: tailscale

  # -- Multi-tailnet / MSP list. Optional; mutually exclusive with an explicit tailscale.tailnet
  # (leave it "-" when using this). Each entry observes one tailnet and is self-contained (its own
  # name + auth + http); credentials are NOT inherited from the tailscale block. Tailnet identity is
  # emitted as the tailscale.tailnet OTEL resource attribute (one target_info per tailnet). Set
  # per-tailnet secrets via TS2OTEL_* env is NOT supported for the list (file-only) — provide creds
  # inline here or mount a config file. Streaming/webhook receivers require single-tailnet mode.
  # Default empty (single tailnet from the tailscale block below).
  # When this list is non-empty the chart renders the whole config.yaml into a dedicated
  # Secret (<fullname>-config) instead of a ConfigMap, so the inline per-tailnet credentials
  # never land in a ConfigMap readable by namespace viewers.
  tailnets: []

  # Headscale control-plane connection. Used only when provider: headscale. The api_key is a
  # Bearer token — set it via the secret TS2OTEL_HEADSCALE__API_KEY (above), not here.
  headscale:
    # -- Headscale control-plane base URL, e.g. https://headscale.example.org.
    url: ""
    # -- Bearer API key. Prefer the TS2OTEL_HEADSCALE__API_KEY secret over an inline value.
    api_key: ""
    http:
      # -- Per-request timeout for Headscale API calls (the only http knob applied in v1).
      timeout: 30s
      # retry/rate_limit are accepted for parity with tailscale.http but not applied by the v1 client.
      retry:
        max_attempts: 0
        base_delay: 0s
        max_delay: 0s
      rate_limit: 0

  tailscale:
    # -- Tailnet name, or "-" for the auth principal's default tailnet (the default,
    # which works out of the box for single-tailnet OAuth). Override with the
    # TS2OTEL_TAILSCALE__TAILNET env var (set via secret above).
    tailnet: "-"
    auth:
      # -- Auth method: oauth (recommended) | apikey. Prefer an OAuth client (short-lived scoped
      # tokens, not user-tied); a personal API key expires in <=90 days and is user-tied, and the
      # exporter logs a WARN when apikey is selected.
      method: oauth
      oauth:
        # -- OAuth client ID. Set via TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_ID (secret).
        client_id: ""
        # -- OAuth client secret. Set via TS2OTEL_TAILSCALE__AUTH__OAUTH__CLIENT_SECRET (secret).
        client_secret: ""
        # -- OAuth scopes to request. "all:read" covers every read-only collector.
        scopes: ["all:read"]
      # -- API key, used only when method: apikey. Set via TS2OTEL_TAILSCALE__AUTH__APIKEY (secret).
      apikey: ""
    http:
      # -- Per-request HTTP timeout for Tailscale API calls.
      timeout: 30s
      retry:
        # -- Max attempts per request (incl. the first) before giving up.
        max_attempts: 4
        # -- Initial backoff delay; doubles each retry up to max_delay.
        base_delay: 500ms
        # -- Ceiling on the per-retry backoff delay.
        max_delay: 10s
      # -- Global requests/sec across all collectors (0 = unlimited).
      rate_limit: 0

  otlp:
    # -- Export protocol: http | grpc | stdout (stdout = local debug).
    protocol: http
    # -- OTLP endpoint base URL. For Grafana Cloud use the otlp-gateway URL for YOUR region
    # (the /v1/metrics and /v1/logs paths are appended automatically on the http protocol).
    endpoint: "https://otlp-gateway-prod-us-central-0.grafana.net/otlp"
    grafana_cloud:
      # -- Grafana Cloud instance/stack ID. Convenience: expands to an
      # "Authorization: Basic <base64(instance_id:token)>" header.
      # Set via TS2OTEL_OTLP__GRAFANA_CLOUD__INSTANCE_ID (secret).
      instance_id: ""
      # -- Grafana Cloud OTLP token paired with instance_id.
      # Set via TS2OTEL_OTLP__GRAFANA_CLOUD__TOKEN (secret).
      token: ""
    # -- Extra raw headers (alternative to grafana_cloud, e.g. for a non-Grafana backend).
    headers: {}
    tls:
      # -- Skip TLS certificate verification (insecure; for local/testing only).
      insecure: false
      # -- Path to a CA bundle to verify the server certificate.
      ca_file: ""
      # -- Client certificate for mutual TLS.
      cert_file: ""
      # -- Client private key for mutual TLS.
      key_file: ""
    # -- How often metrics are pushed (the metric export interval).
    metric_interval: 60s

  enrichment:
    # -- Staleness alarm threshold for the device-enrichment cache (drives the
    # tailscale2otel.enrich.cache_age self-obs gauge); does not evict entries.
    cache_ttl: 5m
    reverse_dns:
      # -- Opt-in reverse-DNS (PTR) enrichment of EXTERNAL flow addresses; resolved names replace
      # the "external" bucket in tailscale.src/dst.node (flow logs always; flow metrics when
      # cardinality.flow.node_dims is on). On flow METRICS this can add ~one series per external IP.
      enabled: false
      # -- Resolver to query as "ip" or "ip:port" (default port 53); empty = system/container resolver.
      server: ""
      # -- Per-lookup timeout.
      timeout: 2s
      # -- How long a resolved name is cached (PTRs rarely change, so a long TTL keeps resolver load low).
      cache_ttl: 24h
      # -- How long a failed lookup is remembered (suppresses retries).
      negative_ttl: 5m
      # -- Cache size bound; new external IPs beyond this are not resolved (~150 bytes/entry).
      max_entries: 50000
      # -- Acknowledge the flow-metric cardinality cost of enabled+node_dims and silence the startup
      # advisory (config_warnings_ratio). Set true once cardinality.metric_limit is sized for it.
      acknowledge_cardinality: false

  cardinality:
    # -- Hard per-metric series cap (0/negative = unlimited).
    metric_limit: 10000
    # -- Emit per-DERP-region rollup gauges (tailscale.derp.region.*) on the devices collector.
    derp_region_rollup: true
    # -- Emit the per-CIDR tailscale.subnet_routes.routers redundancy gauge (one series per subnet CIDR);
    # the fleet exit/subnet count aggregates emit regardless.
    subnet_route_rollup: true
    flow:
      # -- Which flow metric families to emit: rollup (default) | all | both. rollup = bounded top-N
      # *.rollup families (busiest src/dst node pairs by bytes; remainder folds into an __other__ series so
      # totals are preserved; no L4 ports; adds tailscale.network.unique.* gauges). all = raw per-connection
      # tailscale.network.io/packets shaped by the toggles below. both = emit both (~2x series; summing double-counts).
      metrics_mode: rollup
      # -- Rollup only: busiest src/dst node pairs kept per flush; the rest fold into __other__. 0 = default (500).
      rollup_top_n: 500
      # -- Add source.port to flow METRICS (independent of destination_port); ports are always on flow LOGS.
      source_port: false
      # -- Add destination.port to flow METRICS (independent of source_port).
      destination_port: false
      # -- Add tailscale.dst.service (IANA service name, e.g. tcp/443->https) to flow METRICS — a bounded stand-in for destination.port; always on flow LOGS.
      destination_service: false
      # -- Include src/dst device names as dimensions on flow metrics.
      node_dims: true
      # -- Bucket unresolved IPs as external/unknown to cap cardinality. Affects flow LOGS and,
      # when node_dims is true, the src/dst node labels on flow METRICS.
      collapse_external: true
      # -- Emit the bounded tailscale.exit_node.io/packets counters attributing exit traffic to the
      # relaying node (bounded by exit-node count); independent of metrics_mode.
      exit_node_attribution: true
    per_entity:
      # -- Emit per-device gauges (online/last_seen/key.expiry/derp/routes); false emits only the
      # aggregate tailscale.devices.count rollup.
      device: true
      # -- Emit per-user gauges (devices/connected/last_seen); false emits only tailscale.users.count.
      user: true
      # -- Emit the per-key expiry gauge; false emits only tailscale.keys.count (the key-expiry warning log still fires).
      key: true
      # -- Emit the per-endpoint webhook subscriptions gauge; false emits only tailscale.webhook_endpoints.count.
      webhook: true
      # -- Emit the per-service ports/hosts gauges; false emits only tailscale.services.count.
      service: true

  collectors:
    devices:
      # -- Enable the devices collector (device.online/last_seen/key_expiry/update_available).
      enabled: true
      # -- Poll interval.
      interval: 60s
      # -- Also collect advertised/enabled subnet routes and per-DERP latency via the rich
      # GET /devices?fields=all endpoint.
      collect_routes: false
      # -- Emit per-device NAT/connectivity health (tailscale.device.connectivity.*) plus the fleet
      # connectivity rollups (tailscale.devices.hard_nat/direct_capable/client_supports) from the rich
      # device payload (no extra API call). Per-device gauges additionally gated by per_entity.device.
      collect_connectivity: true
      # -- Emit per-device posture attributes as log records (gated; requires posture identity on).
      collect_posture: false
      # -- Inventory outstanding device-share invites via GET /device/{id}/device-invites (one API
      # call per device, N+1; needs the device_invites:read OAuth scope, covered by all:read).
      # Emits tailscale.device_invites.count; per-device fetch failures are non-fatal.
      collect_device_invites: true
      # -- Posture-attribute namespace prefixes promoted to the tailscale.device.attribute{,.info}
      # metrics (needs collect_posture). `["*"]` = every namespace incl. node/custom; `[]` = disabled.
      attribute_namespaces: [intune, jamf, kandji, crowdstrike, sentinelone, kolide, ip]
      # -- Emit the tailscale.devices.by_tag distribution gauge (one series per ACL tag).
      # false keeps the other fleet-hygiene aggregates (untagged/ephemeral/by_version/key_expiry).
      collect_tag_rollup: true
      # -- Cap on distinct tag series for by_tag: busiest N tags keep their own series, the rest
      # fold into tailscale.tag="__other__". 0 or negative = unlimited.
      tag_rollup_limit: 50
    flowlogs:
      # -- Enable the network-flow-logs collector (aggregated metrics + full-fidelity logs).
      enabled: true
      # -- Ingestion source: poll | stream | both. PICK ONE method per log type: `both`
      # runs poll AND the `streaming` receiver and risks double-counting — cross-source
      # de-duplication is a best-effort FAILSAFE, not a guarantee. The exporter logs a WARN
      # at startup when streaming is enabled while this collector still polls. Set `stream`
      # (not poll/both) when config.streaming.enabled is true.
      source: poll
      # -- Poll interval.
      interval: 60s
      # -- Tail-hazard lag: never poll closer than this to now, so a window only closes once
      # Tailscale has finished writing it (avoids missing late-arriving records).
      lag: 120s
      # -- Cold-start lookback on first run when no checkpoint exists.
      initial_lookback: 5m
      # -- Maximum width of a single poll window (caps catch-up after downtime).
      max_window: 1h
      # -- Flow-log verbosity: per_connection | per_record | off (off = metrics only, no logs).
      log_mode: per_connection
      # -- Cap on flow LOG records per poll window (0 = unlimited). Excess is counted into
      # tailscale.network.flow.logs_dropped; METRICS are never capped, only logs.
      max_log_records_per_window: 0
    auditlogs:
      # -- Enable the configuration-audit-logs collector.
      enabled: true
      # -- Ingestion source: poll | stream | both. Pick ONE method per log type (see
      # flowlogs.source): `both` risks double-counting and de-dup is only a best-effort
      # failsafe (WARNed at startup). Set `stream` when config.streaming.enabled is true.
      source: poll
      # -- Poll interval.
      interval: 60s
      # -- Tail-hazard lag (see flowlogs.lag).
      lag: 60s
      # -- Cold-start lookback on first run.
      initial_lookback: 5m
      # -- Maximum width of a single poll window.
      max_window: 6h
    users:
      # -- Enable the users collector (users.count, per-user devices/connected/last_seen).
      enabled: true
      # -- Poll interval (user data changes slowly).
      interval: 300s
    keys:
      # -- Enable the auth/API keys collector (key.expiry, keys.count).
      enabled: true
      # -- Poll interval.
      interval: 300s
      # -- Emit a tailscale.key.expiring WARN log when a key expires within this window.
      expiry_warn: 168h
    settings:
      # -- Enable the tailnet-settings collector (setting.enabled flags, key-duration).
      enabled: true
      # -- Poll interval (settings change rarely).
      interval: 600s
    acl:
      # -- Enable the ACL/policy collector (acl.last_changed, acl.size, acl.rules by section).
      enabled: true
      # -- Poll interval.
      interval: 600s
    dns:
      # -- Enable the DNS collector (nameservers/search-paths/split-zones counts, MagicDNS).
      enabled: true
      # -- Poll interval.
      interval: 600s
    contacts:
      # -- Enable the contacts collector (account/support/security contact verification; no emails emitted).
      enabled: true
      # -- Poll interval.
      interval: 600s
    webhooks:
      # -- Enable the webhook-endpoint inventory collector (count + per-endpoint subscriptions; no url/secret).
      enabled: true
      # -- Poll interval.
      interval: 600s
    posture_integrations:
      # -- Enable the device-posture-integration collector (MDM/EDR matched counts + last_sync staleness).
      enabled: true
      # -- Poll interval.
      interval: 600s
    log_stream:
      # -- Enable the log-streaming delivery-health collector. Self-gates to configured=0 (no error)
      # when no SIEM sink is configured for a log type.
      enabled: true
      # -- Poll interval.
      interval: 600s
    services:
      # -- Enable the Tailscale Services (VIP) collector (services.count + per-service ports/hosts).
      enabled: true
      # -- Poll interval.
      interval: 600s
      # -- Also collect per-service backing-host detail (approval/configured state) — one extra API
      # call per service (N+1). Off by default.
      collect_hosts: false
    # Optional: scrape tailscaled per-node Prometheus /metrics endpoints and forward
    # them centrally over OTLP. Off by default; disabled when no targets are configured.
    node_metrics:
      # -- Enable the node-metrics scraper. Requires at least one entry in `targets`.
      enabled: false
      # -- Scrape interval for every target.
      interval: 60s
      # -- Per-scrape HTTP timeout.
      timeout: 10s
      # -- List of scrape targets. Each: {url, instance, labels{}, bearer_token, bearer_token_file,
      # headers{}, tls{insecure,ca_file,cert_file,key_file}}. The "instance" label is the node identity.
      targets: []
      # -- Passthrough allow-list: anchored regex on the forwarded metric NAME; if non-empty, only matching names are forwarded.
      metric_allow: []
      # -- Passthrough deny-list: anchored regex; names matching any are dropped (after metric_allow).
      metric_deny: []
      # -- Label keys stripped from every forwarded series (the instance label is never dropped).
      drop_labels: []

  checkpoint:
    # -- Checkpoint store: memory | file. "memory" loses window cursors on restart (re-does
    # initial_lookback); "file" persists them atomically (needs a writable volume at file_path).
    store: file
    # -- Checkpoint file path when store: file (mount a writable volume here).
    file_path: "/var/lib/tailscale2otel/checkpoints.json"

  # Optional Splunk-HEC-compatible receiver for streamed logs. When enabled, set the
  # flowlogs/auditlogs source to `stream` (NOT poll/both) so each log type is ingested by
  # exactly ONE path; running both the poller and this receiver for the same log type risks
  # double-counting (cross-source de-dup is a best-effort failsafe, WARNed at startup).
  # Token: set via TS2OTEL_STREAMING__TOKEN (secret).
  streaming:
    # -- Enable the HEC-style streaming receiver.
    enabled: false
    # -- Address the receiver binds (host:port).
    listen: ":8088"
    # -- HTTP path the receiver serves (the Splunk-HEC event endpoint).
    path: "/services/collector/event"
    # -- Expected as 'Authorization: Splunk <token>'. Set via TS2OTEL_STREAMING__TOKEN (secret).
    token: ""
    # -- Externally reachable receiver URL; REQUIRED when auto_configure: true.
    public_url: ""
    tls:
      # -- TLS certificate file; set with key_file to serve the receiver over HTTPS.
      cert_file: ""
      # -- TLS private key file paired with cert_file.
      key_file: ""
    # -- Body decompression: auto | gzip | zstd | none.
    decompress: auto
    # -- PUT this receiver as a Splunk-HEC log-streaming sink on startup (requires public_url).
    # Registers BOTH log types (network/flow AND configuration/audit), OVERWRITING any existing
    # sink for either. NEVER enable against a tailnet whose streaming you do not intend to overwrite.
    auto_configure: false
    # -- Cap on DECOMPRESSED body; 0 = 64MiB default, <0 = unlimited (413 on exceed).
    max_body_bytes: 0

  # Optional webhook receiver for real-time Tailscale events.
  # Secret: set via TS2OTEL_WEBHOOK__SECRET (secret).
  webhook:
    # -- Enable the webhook receiver.
    enabled: false
    # -- Address the receiver binds (host:port).
    listen: ":8089"
    # -- HTTP path the receiver serves.
    path: "/tailscale/webhook"
    # -- HMAC-SHA256 verification secret. Empty SKIPS verification (accepts unsigned POSTs).
    # Set via TS2OTEL_WEBHOOK__SECRET (secret).
    secret: ""
    # -- Best-effort: drop a webhook event already counted via the audit logs (off by default).
    dedup_audit_events: false

  self_observability:
    # -- Emit the exporter's own health metrics (scrape/api/export/build_info/enrich/runtime).
    enabled: true
    # -- service.instance.id resource attribute; empty falls back to the pod/host name. Override
    # with TS2OTEL_SELF_OBSERVABILITY__INSTANCE_ID (e.g. set to the pod name via the Downward API).
    instance_id: ""

  # PII / identifier redaction. All categories default true (emitted). Set a category to
  # false to drop those identifiers from metrics and logs at runtime (opt-out). Disabling a
  # category whose label is a gauge's sole identity suppresses that gauge's datapoints.
  pii_filter:
    # -- Emit user/actor login names (often emails).
    emails: true
    # -- Emit actor display (human) names.
    user_display_names: true
    # -- Emit numeric/opaque user IDs (enduser.id).
    user_ids: true
    # -- Emit device + collector-host hostnames.
    hostnames: true
    # -- Emit Tailscale node IDs.
    node_ids: true
    # -- Emit Tailscale-range addresses (100.64.0.0/10, fd7a:115c:a1e0::/48).
    tailscale_ips: true
    # -- Emit RFC1918 / ULA / link-local addresses.
    internal_ips: true
    # -- Emit public/routable addresses.
    external_ips: true
    # -- Emit VIP service names.
    service_addrs: true
    # -- Emit Tailscale API endpoint paths (self-obs).
    endpoint_paths: true
    # -- Emit route CIDRs, split-DNS domains, and search paths.
    network_topology: true
    # -- Emit the tailnet identifier.
    tailnet_name: true
    # -- Emit audit old/new/details, target names, key descriptions, posture values.
    free_text_details: true

  # Prometheus pull endpoint: serves GET /metrics on a dedicated listener, running an
  # additional metric.Reader alongside OTLP push so both export paths are active at once.
  # Off by default. Bind to a loopback/tailnet address or set prometheus.auth.token for
  # defense-in-depth — the endpoint exposes every series (incl. device/flow identifiers).
  # Token: set via TS2OTEL_PROMETHEUS__AUTH__TOKEN (secret above).
  prometheus:
    # -- Enable the Prometheus pull endpoint (GET /metrics) on its own dedicated listener.
    enabled: false
    # -- Address the Prometheus endpoint binds. Keep distinct from admin.listen.
    listen: ":2112"
    auth:
      # -- Gate /metrics behind this token (HTTP Basic password or "Authorization: Bearer <token>").
      # Empty = open (a WARN fires on a wildcard bind). Set via TS2OTEL_PROMETHEUS__AUTH__TOKEN (secret).
      token: ""

  # Admin HTTP server: liveness/readiness probes plus an optional status landing page.
  # The page exposes operational metadata (collector health, cardinality, discovered
  # nodes, redacted config) but NEVER secret values.
  admin:
    # -- Enable the admin probe server.
    enabled: false
    # -- Address the admin server binds; serves /healthz and /readyz. Bind to loopback/tailnet for defense-in-depth.
    listen: ":9090"
    # -- Serve the human status page at / and machine-readable JSON at /api/status.json.
    landing_page: true
    auth:
      # -- Shared secret gating the status page and pprof (HTTP Basic password or "Authorization: Bearer <token>"); /healthz and /readyz stay open. Set via TS2OTEL_ADMIN__AUTH__TOKEN (secret). Required when profiling.pprof.enabled.
      token: ""

  # Optional continuous/on-demand profiling. Everything here is OFF by default and
  # carries no Tailscale data. The pprof handlers mount on the admin server, so
  # profiling.pprof.enabled requires admin.enabled: true AND admin.auth.token
  # (heap/goroutine dumps can expose in-memory secrets).
  profiling:
    pprof:
      # -- Mount net/http/pprof on the admin server so Grafana Alloy's pyroscope.scrape can PULL profiles. Requires admin.enabled + admin.auth.token.
      enabled: false
    pyroscope:
      # -- Run the Pyroscope continuous-profiling push agent (pyroscope-go SDK).
      enabled: false
      # -- Pyroscope/Grafana Cloud Profiles server URL. REQUIRED when enabled.
      server_address: ""
      # -- Basic-auth user (Grafana Cloud: the profiles instance ID). Set via TS2OTEL_PROFILING__PYROSCOPE__BASIC_AUTH_USER (secret).
      basic_auth_user: ""
      # -- Basic-auth password (Grafana Cloud: an access policy token with profiles:write). Set via TS2OTEL_PROFILING__PYROSCOPE__BASIC_AUTH_PASSWORD (secret).
      basic_auth_password: ""
      # -- X-Scope-OrgID for multi-tenant servers (leave empty for Grafana Cloud).
      tenant_id: ""
      # -- How often profiles are flushed to the server.
      upload_rate: 60s
      # -- Extra static labels merged onto every profile, e.g. { env: prod }.
      tags: {}
    # -- runtime.SetMutexProfileFraction; >0 enables mutex profiling for both push and pull.
    mutex_profile_fraction: 0
    # -- runtime.SetBlockProfileRate (nanoseconds); >0 enables block profiling for both push and pull.
    block_profile_rate: 0

  # -- OTEL traces pillar (spans for the exporter's own work). OFF by default;
  # reuses otlp.* for the endpoint/protocol/headers/TLS.
  tracing:
    # -- Emit spans. When true, also enables trace-based exemplars on tailscale2otel.api.duration.
    enabled: false
    # -- Head sampler (always_on|always_off|traceidratio|parentbased_always_on|parentbased_traceidratio).
    sampler: parentbased_always_on
    # -- Sample ratio in [0,1] for the *traceidratio samplers (ignored otherwise).
    sampler_arg: 1.0

  version_checks:
    self:
      # -- Emit tailscale2otel.update_available (running build vs latest tailscale2otel GitHub release). Makes an outbound HTTPS call; fail-open. Disable for air-gapped deployments.
      enabled: true
    devices:
      # -- Emit per-device tailscale.device.version_skew + fleet roll-ups (device client version vs latest Tailscale stable). Makes an outbound HTTPS call; fail-open. Needs the devices collector.
      enabled: true
      # -- A device this many minor releases behind the latest Tailscale stable counts toward tailscale.devices.outdated.
      outdated_minor_threshold: 3
    # -- How long a fetched "latest version" is cached before re-fetching (minimum 5m).
    cache_ttl: 1h
    # -- Per-request timeout for the external version fetch.
    timeout: 10s

# --- Checkpoint persistence ---
persistence:
  # -- Persist checkpoints (window cursors) across restarts. When false, an emptyDir is used
  # (survives container restarts within a pod, but not rescheduling); when true, a PVC is created.
  enabled: false
  # -- StorageClass for the PVC (empty = cluster default). Only used when enabled.
  storageClass: ""
  # -- PVC access mode.
  accessMode: ReadWriteOnce
  # -- PVC size (checkpoints are tiny).
  size: 64Mi
  # -- Use an existing PVC instead of creating one (empty = create one). Only used when enabled.
  existingClaim: ""
