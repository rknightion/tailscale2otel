apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tailscale2otel.fullname" . }}
  labels:
    {{- include "tailscale2otel.labels" . | nindent 4 }}
spec:
  # Singleton poller — do not scale horizontally (would double-emit).
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "tailscale2otel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the config or secret changes.
        checksum/config: {{ include "tailscale2otel.config" . | sha256sum }}
        {{- if not .Values.existingSecret }}
        checksum/secret: {{ toYaml .Values.secret | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "tailscale2otel.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tailscale2otel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: tailscale2otel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config", "/etc/tailscale2otel/config.yaml"]
          envFrom:
            - secretRef:
                name: {{ include "tailscale2otel.secretName" . }}
          {{- if or .Values.goRuntime.gogc .Values.goRuntime.memLimit }}
          env:
            {{- if .Values.goRuntime.gogc }}
            - name: GOGC
              value: {{ .Values.goRuntime.gogc | quote }}
            {{- end }}
            {{- if .Values.goRuntime.memLimit }}
            - name: GOMEMLIMIT
              value: {{ .Values.goRuntime.memLimit | quote }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/tailscale2otel
              readOnly: true
            - name: checkpoints
              mountPath: /var/lib/tailscale2otel
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "tailscale2otel.fullname" . }}
        - name: checkpoints
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "tailscale2otel.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
