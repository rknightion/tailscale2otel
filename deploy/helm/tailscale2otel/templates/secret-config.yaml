{{- /*
When config.tailnets is non-empty the rendered config.yaml contains inline
per-tailnet credentials (the list is file-only — there is no TS2OTEL_* env path
for it), so the config file is stored in a Secret rather than the ConfigMap.
Single-tailnet deployments keep the ConfigMap (see configmap.yaml).
*/}}
{{- if .Values.config.tailnets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tailscale2otel.fullname" . }}-config
  labels:
    {{- include "tailscale2otel.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    {{- include "tailscale2otel.config" . | nindent 4 }}
{{- end }}
