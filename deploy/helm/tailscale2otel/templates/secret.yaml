{{- if not .Values.existingSecret }}
{{- /*
Empty values are deliberately NOT rendered: an empty TS2OTEL_* env var is still a
set variable inside the pod and env overrides the config file, so rendering ""
would silently blank the same key supplied via config.yaml (e.g. a streaming
token or webhook secret set under `config:`), disabling receiver auth.
*/}}
{{- $vals := dict }}
{{- range $k, $v := .Values.secret }}
{{- if $v }}{{- $_ := set $vals $k $v }}{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tailscale2otel.fullname" . }}
  labels:
    {{- include "tailscale2otel.labels" . | nindent 4 }}
type: Opaque
{{- if $vals }}
stringData:
  {{- range $k, $v := $vals }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
